worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  access_log /dev/stdout;
  sendfile on;
  keepalive_timeout 65;
  server_tokens off;

  # Long cache for hashed webpack output, no cache for the shell HTML.
  map $uri $cache_control {
    default                         "no-cache, no-store, must-revalidate";
    ~^/public/build/                "public, max-age=31536000, immutable";
    ~^/public/fonts/                "public, max-age=31536000, immutable";
  }

  server {
    listen 3000 default_server;
    server_name _;

    root /var/www/grafana;

    add_header Cache-Control $cache_control always;

    # SPA fallback: every non-file request returns index.html so client-side
    # routing takes over. Meticulous replays /bootdata and /api/* from its
    # baseline recording.
    location / {
      try_files $uri /index.html;
    }

    location = /index.html {
      add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
  }
}
