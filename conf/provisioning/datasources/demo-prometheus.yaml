# Prometheus datasource used by the Alert quality demo rules.
# Fixed uid so the provisioned rules bind deterministically on any instance.
apiVersion: 1

datasources:
  - name: Demo Prometheus
    uid: demo-prometheus
    type: prometheus
    access: proxy
    url: http://localhost:9090
    isDefault: false
    editable: true
    basicAuth: true
    basicAuthUser: admin
    jsonData:
      httpMethod: POST
      manageAlerts: false
      prometheusType: Prometheus
    secureJsonData:
      basicAuthPassword: admin
