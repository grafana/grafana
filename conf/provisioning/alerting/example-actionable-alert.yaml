        intervalMs: 1000
        maxDataPoints: 43200
        datasource:
          type: prometheus
          uid: demo-prometheus
    - refId: C
      relativeTimeRange:
        from: 0
        to: 0
      datasourceUid: __expr__
      model:
        refId: C
        type: threshold
        expression: A
        conditions:
        - evaluator:
            type: gt
            params:
            - 2
        intervalMs: 1000
        maxDataPoints: 43200
        datasource:
          type: __expr__
          uid: __expr__
    noDataState: NoData
    execErrState: Alerting
    for: 5m
    annotations:
      summary: Checkout latency degraded for {{ $labels.region }}
      runbook_url: https://runbooks.example.com/payments/checkout-latency
