      datasourceUid: __expr__
      model:
        refId: C
        type: threshold
        expression: A
        conditions:
        - evaluator:
            type: gt
            params:
            - 100
        intervalMs: 1000
        maxDataPoints: 43200
        datasource:
          type: __expr__
