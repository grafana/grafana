        refId: A
        instant: true
        range: false
        editorMode: code
        expr: max(instance:node_cpu_utilisation:rate5m)
        intervalMs: 1000
        maxDataPoints: 43200
        datasource:
          type: prometheus
          uid: demo-prometheus
    - refId: C
      relativeTimeRange:
        from: 0
        to: 0
      datasourceUid: __expr__
      model:
        refId: C
        type: threshold
        expression: A
        conditions:
        - evaluator:
            type: gt
            params:
            - 0.9
        intervalMs: 1000
        maxDataPoints: 43200
        datasource:
          type: __expr__
          uid: __expr__
    noDataState: NoData
    execErrState: Alerting
    for: 5m
    labels:
      severity: warning
      team: platform
