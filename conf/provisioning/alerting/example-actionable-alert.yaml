# Realistic seed data for the "Alert quality" tab demo.
#
# Per-team folders with uneven sizes. ~a third of rules are fully annotated and won't
# appear on the Quality tab; the rest are missing fields (HIGH = missing runbook_url,
# MEDIUM = has runbook_url but missing summary/description).
#
# Each rule queries the 'demo-prometheus' datasource (make devenv sources=prometheus)
# with a PromQL query (refId A) and a threshold expression condition (refId C).
#
# Provision with the "Alert quality" reject toggles OFF (else incomplete rules are
# rejected at load). Turn them on afterwards to block NEW incomplete rules.
apiVersion: 1
disableProvenance: true
deleteRules:
- orgId: 1
  uid: quality_mystery_cpu
- orgId: 1
  uid: quality_mystery_memory
- orgId: 1
  uid: quality_disk_space
- orgId: 1
  uid: quality_latency_p99
- orgId: 1
  uid: quality_error_budget
- orgId: 1
  uid: quality_good_http_errors
- orgId: 1
  uid: quality_good_db_connections
- orgId: 1
  uid: quality_payments_declined
- orgId: 1
  uid: quality_payments_latency
- orgId: 1
  uid: quality_payments_gateway
- orgId: 1
  uid: auth_provider_down
- orgId: 1
  uid: search_zero_results_rate
- orgId: 1
  uid: pay_gateway_unreachable
- orgId: 1
  uid: pay_refund_backlog
- orgId: 1
  uid: pay_fraud_queue_backlog
- orgId: 1
  uid: store_5xx_error_rate
- orgId: 1
  uid: store_cdn_cache_miss
- orgId: 1
  uid: store_inventory_sync_lag
- orgId: 1
  uid: infra_cert_expiry
- orgId: 1
  uid: infra_etcd_latency
- orgId: 1
  uid: infra_oom_kills
- orgId: 1
  uid: auth_token_issuance_errors
- orgId: 1
  uid: auth_session_store_latency
- orgId: 1
  uid: data_freshness_sla
- orgId: 1
  uid: data_event_drop_rate
- orgId: 1
  uid: search_query_errors
- orgId: 1
  uid: search_cluster_red
- orgId: 1
  uid: store_page_load_latency
- orgId: 1
  uid: infra_disk_pressure
- orgId: 1
  uid: infra_pod_crashloop
- orgId: 1
  uid: auth_login_failure_spike
- orgId: 1
  uid: data_warehouse_query_latency
- orgId: 1
  uid: search_indexing_lag
groups:
- orgId: 1
  name: payments
  folder: Payments
  interval: 1m
  rules:
  - uid: pay_decline_rate_spike
    title: Payment decline rate spike
    condition: C
    data:
    - refId: A
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: demo-prometheus
      model:
        refId: A
        instant: true
        range: false
        editorMode: code
        expr: sum(rate(payment_attempts_total{status="declined"}[5m])) / sum(rate(payment_attempts_total[5m]))
        intervalMs: 1000
        maxDataPoints: 43200
        datasource:
          type: prometheus
          uid: demo-prometheus
    - refId: C
      relativeTimeRange:
        from: 0
        to: 0
      datasourceUid: __expr__
      model:
        refId: C
        type: threshold
        expression: A
        conditions:
        - evaluator:
            type: gt
            params:
            - 0.1
        intervalMs: 1000
        maxDataPoints: 43200
        datasource:
          type: __expr__
          uid: __expr__
    noDataState: NoData
    execErrState: Alerting
    for: 5m
    annotations:
      summary: Decline rate above threshold for {{ $labels.region }}
      description: 'The card decline rate exceeded the threshold for 5m. Current value: {{ $values.A }}.'
      runbook_url: https://runbooks.example.com/payments/declines
    labels:
      severity: critical
      team: payments
  - uid: pay_checkout_latency
    title: Checkout latency degraded
    condition: C
    data:
    - refId: A
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: demo-prometheus
      model:
        refId: A
        instant: true
        range: false
        editorMode: code
        expr: histogram_quantile(0.95, sum(rate(checkout_request_duration_seconds_bucket[5m])) by (le))
        intervalMs: 1000
        maxDataPoints: 43200
        datasource:
          type: prometheus
          uid: demo-prometheus
    - refId: C
      relativeTimeRange:
        from: 0
        to: 0
      datasourceUid: __expr__
      model:
        refId: C
        type: threshold
        expression: A
        conditions:
        - evaluator:
            type: gt
            params:
            - 2
        intervalMs: 1000
        maxDataPoints: 43200
        datasource:
          type: __expr__
          uid: __expr__
    noDataState: NoData
    execErrState: Alerting
    for: 5m
    annotations:
      summary: Checkout latency degraded for {{ $labels.region }}
      runbook_url: https://runbooks.example.com/payments/checkout-latency
    labels:
      severity: warning
      team: payments
  - uid: pay_settlement_delay
    title: Settlement batch delayed
    condition: C
    data:
    - refId: A
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: demo-prometheus
      model:
        refId: A
        instant: true
        range: false
        editorMode: code
        expr: time() - max(settlement_batch_last_success_timestamp_seconds)
        intervalMs: 1000
        maxDataPoints: 43200
        datasource:
          type: prometheus
          uid: demo-prometheus
    - refId: C
      relativeTimeRange:
        from: 0
        to: 0
      datasourceUid: __expr__
      model:
        refId: C
        type: threshold
        expression: A
        conditions:
        - evaluator:
            type: gt
            params:
            - 3600
        intervalMs: 1000
        maxDataPoints: 43200
        datasource:
          type: __expr__
          uid: __expr__
    noDataState: NoData
    execErrState: Alerting
    for: 5m
    labels:
      severity: warning
      team: payments
