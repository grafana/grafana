# Realistic seed data for the "Alert quality" tab demo.
#
# Per-team folders with uneven sizes (like a real org). Roughly a third of all rules are
# fully annotated (summary + description + runbook_url) and won't appear on the Quality
# tab; the rest are missing fields:
#   - HIGH severity   = missing runbook_url
#   - MEDIUM severity = has a runbook_url but missing summary and/or description
#
# IMPORTANT: provision this with the "Alert quality" reject toggles OFF, otherwise the
# incomplete rules are rejected at load time (that's the enforcement working). Turn the
# toggles on afterwards to block NEW incomplete rules.
apiVersion: 1

# Remove demo rules provisioned in earlier rounds so only the rules below remain.
deleteRules:
  - { orgId: 1, uid: quality_mystery_cpu }
  - { orgId: 1, uid: quality_mystery_memory }
  - { orgId: 1, uid: quality_disk_space }
  - { orgId: 1, uid: quality_latency_p99 }
  - { orgId: 1, uid: quality_error_budget }
  - { orgId: 1, uid: quality_good_http_errors }
  - { orgId: 1, uid: quality_good_db_connections }
  - { orgId: 1, uid: quality_payments_declined }
  - { orgId: 1, uid: quality_payments_latency }
  - { orgId: 1, uid: quality_payments_gateway }
  - { orgId: 1, uid: auth_provider_down }
  - { orgId: 1, uid: search_zero_results_rate }

groups:
  # ============================ Payments (6) ============================
  - orgId: 1
    name: payments
    folder: Payments
    interval: 1m
    rules:
      # COMPLETE
      - uid: pay_decline_rate_spike
        title: Payment decline rate spike
        condition: A
        data: &alwaysFiring
          - refId: A
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator: { params: [0], type: gt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { type: last }
                  type: query
              datasource: { type: __expr__, uid: "__expr__" }
              expression: 1==1
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
              type: math
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Decline rate above threshold for {{ $labels.region }}"
          description: "The card decline rate exceeded the threshold for 5m. Current value: {{ $values.A }}."
          runbook_url: "https://runbooks.example.com/payments/declines"
        labels: { severity: critical, team: payments }
      # COMPLETE
      - uid: pay_gateway_unreachable
        title: Payment gateway unreachable
        condition: A
        data: *alwaysFiring
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Gateway {{ $labels.gateway }} is unreachable"
          description: "Grafana could not reach payment gateway {{ $labels.gateway }} for 5m. Transactions may be failing."
          runbook_url: "https://runbooks.example.com/payments/gateway"
        labels: { severity: critical, team: payments }
      # MEDIUM (has runbook, no description)
      - uid: pay_checkout_latency
        title: Checkout latency degraded
        condition: A
        data: *alwaysFiring
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Checkout latency degraded for {{ $labels.region }}"
          runbook_url: "https://runbooks.example.com/payments/checkout-latency"
        labels: { severity: warning, team: payments }
      # HIGH (summary + description, no runbook)
      - uid: pay_refund_backlog
        title: Refund processing backlog
        condition: A
        data: *alwaysFiring
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Refund backlog growing"
          description: "Pending refunds have exceeded the backlog threshold for 5m."
        labels: { severity: warning, team: payments }
      # HIGH (nothing)
      - uid: pay_settlement_delay
        title: Settlement batch delayed
        condition: A
        data: *alwaysFiring
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        labels: { severity: warning, team: payments }
      # HIGH (nothing)
      - uid: pay_fraud_queue_backlog
        title: Fraud review queue backlog
        condition: A
        data: *alwaysFiring
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        labels: { severity: warning, team: payments }

