        title: Page load latency degraded
        condition: A
        data: *alwaysFiring
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Page load latency degraded for {{ $labels.route }}"
          runbook_url: "https://runbooks.example.com/storefront/latency"
        labels: { severity: warning, team: storefront }
      # HIGH (summary + description, no runbook)
