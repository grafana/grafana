        title: CDN cache miss ratio high
        condition: A
        data: *alwaysFiring
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "CDN cache miss ratio is high"
          description: "Origin traffic is elevated because the CDN cache miss ratio exceeded the threshold."
        labels: { severity: warning, team: storefront }
      # HIGH (nothing)
      - uid: store_cart_abandonment
        title: Cart abandonment spike
        condition: A
        data: *alwaysFiring
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        labels: { severity: warning, team: storefront }
      # HIGH (nothing)
      - uid: store_inventory_sync_lag
