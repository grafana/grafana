  # ============================ Platform (7) ============================
  - orgId: 1
    name: platform
    folder: Platform
    interval: 1m
    rules:
      # COMPLETE
      - uid: infra_node_not_ready
        title: Kubernetes node not ready
        condition: A
        data: *alwaysFiring
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Node {{ $labels.node }} is NotReady"
          description: "Node {{ $labels.node }} has been NotReady for 5m. Workloads may be rescheduling."
          runbook_url: "https://runbooks.example.com/platform/node-not-ready"
        labels: { severity: critical, team: platform }
      # COMPLETE
      - uid: infra_cert_expiry
        title: TLS certificate expiring soon
        condition: A
        data: *alwaysFiring
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Certificate for {{ $labels.domain }} expires soon"
          description: "The TLS certificate for {{ $labels.domain }} expires in under 7 days."
          runbook_url: "https://runbooks.example.com/platform/cert-renewal"
        labels: { severity: warning, team: platform }
      # MEDIUM (has runbook, no description)
      - uid: infra_disk_pressure
        title: Disk pressure on node
        condition: A
        data: *alwaysFiring
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Disk pressure on {{ $labels.node }}"
          runbook_url: "https://runbooks.example.com/platform/disk-pressure"
        labels: { severity: warning, team: platform }
      # MEDIUM (has runbook, no description)
      - uid: infra_etcd_latency
        title: etcd request latency high
        condition: A
        data: *alwaysFiring
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "etcd request latency is high"
          runbook_url: "https://runbooks.example.com/platform/etcd-latency"
        labels: { severity: critical, team: platform }
      # HIGH (summary + description, no runbook)
      - uid: infra_oom_kills
        title: Container OOM kills
        condition: A
        data: *alwaysFiring
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Containers are being OOM killed"
          description: "One or more containers in {{ $labels.namespace }} have been OOM killed in the last 5m."
        labels: { severity: warning, team: platform }
      # HIGH (nothing)
      - uid: infra_high_cpu
        title: High CPU saturation
        condition: A
        data: *alwaysFiring
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        labels: { severity: warning, team: platform }
      # HIGH (nothing)
      - uid: infra_pod_crashloop
        title: Pods in CrashLoopBackOff
        condition: A
        data: *alwaysFiring
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        labels: { severity: critical, team: platform }

