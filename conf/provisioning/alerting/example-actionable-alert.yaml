- orgId: 1
  name: platform
  folder: Platform
  interval: 1m
  rules:
  - uid: infra_node_not_ready
    title: Kubernetes node not ready
    condition: C
    data:
    - refId: A
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: demo-prometheus
      model:
        refId: A
        instant: true
        range: false
        editorMode: code
        expr: sum(kube_node_status_condition{condition="Ready",status="true"} == 0)
        intervalMs: 1000
        maxDataPoints: 43200
        datasource:
          type: prometheus
          uid: demo-prometheus
    - refId: C
      relativeTimeRange:
        from: 0
        to: 0
      datasourceUid: __expr__
      model:
        refId: C
        type: threshold
        expression: A
        conditions:
        - evaluator:
            type: gt
            params:
            - 0
        intervalMs: 1000
        maxDataPoints: 43200
        datasource:
          type: __expr__
          uid: __expr__
    noDataState: NoData
    execErrState: Alerting
    for: 5m
    annotations:
      summary: Node {{ $labels.node }} is NotReady
      description: Node {{ $labels.node }} has been NotReady for 5m. Workloads may be rescheduling.
      runbook_url: https://runbooks.example.com/platform/node-not-ready
    labels:
      severity: critical
      team: platform
  - uid: infra_high_cpu
    title: High CPU saturation
    condition: C
    data:
    - refId: A
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: demo-prometheus
