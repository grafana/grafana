# Realistic seed data for the "Alert quality" tab demo.
#
# Per-team folders with uneven sizes. ~a third of rules are fully annotated and won't
# appear on the Quality tab; the rest are missing fields (HIGH = missing runbook_url,
# MEDIUM = has runbook_url but missing summary/description).
#
# Each rule queries the 'demo-prometheus' datasource (make devenv sources=prometheus)
# with a PromQL query (refId A) and a threshold expression condition (refId C).
#
# Provision with the "Alert quality" reject toggles OFF (else incomplete rules are
# rejected at load). Turn them on afterwards to block NEW incomplete rules.
apiVersion: 1
# Provision these rules without provenance so they stay editable in the UI (handy for
# demoing "Fix with AI" / editing). They're still reset to file state on the next provision.
disableProvenance: true
deleteRules:
- orgId: 1
  uid: quality_mystery_cpu
- orgId: 1
  uid: quality_mystery_memory
- orgId: 1
  uid: quality_disk_space
- orgId: 1
  uid: quality_latency_p99
- orgId: 1
  uid: quality_error_budget
- orgId: 1
  uid: quality_good_http_errors
- orgId: 1
  uid: quality_good_db_connections
- orgId: 1
  uid: quality_payments_declined
- orgId: 1
  uid: quality_payments_latency
- orgId: 1
  uid: quality_payments_gateway
- orgId: 1
  uid: auth_provider_down
- orgId: 1
  uid: search_zero_results_rate
groups:
- orgId: 1
  name: payments
  folder: Payments
  interval: 1m
  rules:
  - uid: pay_decline_rate_spike
    title: Payment decline rate spike
    condition: C
    data:
    - refId: A
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: demo-prometheus
      model:
        refId: A
        instant: true
        range: false
        editorMode: code
        expr: sum(rate(payment_attempts_total{status="declined"}[5m])) / sum(rate(payment_attempts_total[5m]))
        intervalMs: 1000
        maxDataPoints: 43200
        datasource:
          type: prometheus
          uid: demo-prometheus
    - refId: C
      relativeTimeRange:
        from: 0
        to: 0
      datasourceUid: __expr__
      model:
        refId: C
        type: threshold
        expression: A
        conditions:
        - evaluator:
            type: gt
            params:
            - 0.1
        intervalMs: 1000
        maxDataPoints: 43200
        datasource:
          type: __expr__
          uid: __expr__
    noDataState: NoData
    execErrState: Alerting
    for: 5m
    annotations:
      summary: Decline rate above threshold for {{ $labels.region }}
      description: 'The card decline rate exceeded the threshold for 5m. Current value: {{ $values.A }}.'
      runbook_url: https://runbooks.example.com/payments/declines
    labels:
      severity: critical
      team: payments
  - uid: pay_gateway_unreachable
    title: Payment gateway unreachable
    condition: C
    data:
    - refId: A
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: demo-prometheus
      model:
        refId: A
        instant: true
        range: false
        editorMode: code
        expr: min(up{job="payment-gateway"})
        intervalMs: 1000
        maxDataPoints: 43200
        datasource:
          type: prometheus
          uid: demo-prometheus
    - refId: C
      relativeTimeRange:
        from: 0
        to: 0
      datasourceUid: __expr__
      model:
        refId: C
        type: threshold
        expression: A
        conditions:
        - evaluator:
            type: lt
            params:
            - 1
        intervalMs: 1000
        maxDataPoints: 43200
        datasource:
          type: __expr__
          uid: __expr__
    noDataState: NoData
    execErrState: Alerting
    for: 5m
    annotations:
      summary: Gateway {{ $labels.gateway }} is unreachable
      description: Grafana could not reach payment gateway {{ $labels.gateway }} for 5m. Transactions may be failing.
      runbook_url: https://runbooks.example.com/payments/gateway
