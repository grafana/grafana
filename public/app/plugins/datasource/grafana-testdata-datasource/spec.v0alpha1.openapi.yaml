routes:
  resource:
    "":
      get:
        responses:
          default:
            content:
              text/plain:
                schema:
                  type: string
      summary: hello world
    /boom:
      get:
        responses:
          default:
            content:
              application/json:
                schema:
                  additionalProperties: true
                  type: object
      post:
        responses:
          default:
            content:
              application/json:
                schema:
                  additionalProperties: true
                  type: object
      summary: force a panic
    /scenarios:
      get:
        responses:
          default:
            content:
              application/json:
                schema:
                  additionalProperties: true
                  type: object
      summary: hello world
    /sim/{key}:
      description: Get list of simulations
      get:
        parameters:
        - description: simulation key (should include hz)
          in: path
          name: key
        responses:
          default:
            content:
              application/json:
                schema:
                  additionalProperties: true
                  type: object
      post:
        parameters:
        - description: simulation key (should include hz)
          in: path
          name: key
        requestBody:
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
        responses:
          default:
            content:
              application/json:
                schema:
                  additionalProperties: true
                  type: object
    /sims:
      description: Get list of simulations
      get:
        responses:
          default:
            content:
              application/json:
                schema:
                  additionalProperties: true
                  type: object
    /stream:
      get:
        parameters:
        - description: number of points that will be returned
          example: 10
          in: query
          name: count
          schema:
            format: int64
            type: integer
        - description: the start value
          in: query
          name: start
          schema:
            format: int64
            type: integer
        - description: How often the result is flushed (1-100%)
          example: 100
          in: query
          name: flush
          schema:
            format: int64
            type: integer
        - description: the clock cycle
          example: 100ms
          in: query
          name: speed
          schema:
            type: string
        - description: the response format
          in: query
          name: format
          schema:
            enum:
            - json
            - influx
            type: string
        responses:
          default:
            content:
              application/json:
                schema:
                  additionalProperties: true
                  type: object
      summary: Get streaming response
    /test:
      post:
        requestBody:
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
        responses:
          default:
            content:
              application/json:
                schema:
                  additionalProperties: true
                  type: object
      summary: Echo any request
    /test/json:
      post:
        requestBody:
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
        responses:
          default:
            content:
              application/json:
                schema:
                  additionalProperties: true
                  type: object
      summary: Echo json request
settings:
  examples:
    "":
      summary: Empty testdata
      value:
        kind: DataSource
        metadata:
          name: my-testdata-datasource
        spec:
          title: My TestData Datasource
    with-url:
      summary: Testdata with URL (not used)
      value:
        kind: DataSource
        metadata:
          name: testdata-with-url
        spec:
          title: TestData with URL
          url: http://example.com
  spec:
    additionalProperties: false
    description: Test data does not require any explicit configuration
    example:
      url: http://xxxx
    properties:
      title:
        description: display name
        type: string
      url:
        description: not used
        type: string
    required:
    - title
