# fullMimirConfig variant with an additional receiver named "grafana-default-email" and a route
# that uses it, to trigger receiver renaming during merge.
mute_time_intervals:
  - name: mti-2
    time_intervals:
      - times:
          - start_time: 00:00
            end_time: 12:00
time_intervals:
  - name: ti-2
    time_intervals:
    - weekdays:
      - monday
      - tuesday
      - wednesday
      - thursday
      - friday
inhibit_rules:
    - source_matchers:
        - alertname="test"
      target_matchers:
        - servicename="test2"
      equal:
        - namespace
route:
  receiver: recv
  group_by:
    - alertname
    - groupby
  group_wait: 65s
  group_interval: 20m
  repeat_interval: 10h
  routes:
    - receiver: recv2
      matchers:
        - team="teamC"
      group_by:
        - teste
        - test2f
      group_wait: 0s
      group_interval: 1m
      repeat_interval: 1m
      mute_time_intervals:
        - mti-2
      active_time_intervals:
        - ti-2
    - receiver: grafana-default-email
      matchers:
        - label="test"
receivers:
  - name: recv
    email_configs:
      - to: recv
        smarthost: smtp.example.org:587
        from: email@example.com
  - name: recv2
    webhook_configs:
      - url: http://localhost
  - name: grafana-default-email
