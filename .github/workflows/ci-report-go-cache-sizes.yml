name: "CI: Report Go Cache Sizes"

on:
  workflow_dispatch:
  schedule:
    # Run daily at 06:00 UTC on weekdays
    - cron: '0 6 * * 1-5'

permissions: {}

jobs:
  report-cache-sizes:
    name: Report Go cache sizes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Report cache sizes after setup-go
        uses: ./.github/actions/report-go-cache-sizes
        with:
          label: after setup-go (cache restored)

      - name: Run a test to populate build cache
        run: CGO_ENABLED=0 go test -short -count=1 ./pkg/util/...

      - name: Report cache sizes after test run
        uses: ./.github/actions/report-go-cache-sizes
        with:
          label: after test run (before post-setup-go)
