name: Create or update GitHub release
on:
  workflow_call:
    inputs:
      version:
        required: true
        description: Needs to match, exactly, the name of a milestone (NO v prefix)
        type: string
      latest:
        required: false
        default: "0"
        description: Mark this release as latest (`1`) or not (`0`, default)
        type: string
      dry_run:
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      version:
        required: true
        description: Needs to match, exactly, the name of a milestone (NO v prefix)
        type: string
      latest:
        required: false
        default: "0"
        description: Mark this release as latest (`1`) or not (`0`, default)
        type: string
      dry_run:
        required: false
        default: false
        type: boolean


# Prevent concurrent runs of the same workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  main:
    timeout-minutes: 15
    permissions:
      # contents: write allows the action(s) to create github releases
      contents: write
      id-token: write
    runs-on: ubuntu-arm64-small
    steps:
      - name: Create GitHub release (manually invoked)
        uses: grafana/grafana-github-actions-go/github-release@main # zizmor: ignore[unpinned-uses]
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: ${{ inputs.version }}
          latest: ${{ inputs.latest }}
          dry_run: ${{ inputs.dry_run }}
    timeout-minutes: 15
  deploy-storybook:
    needs: main
    if: ${{ !inputs.dry_run && inputs.latest == '1' }}
    permissions:
      contents: read
      id-token: write
    uses: grafana/grafana/.github/workflows/deploy-storybook.yml@main
    with:
      version: ${{ inputs.version }}
