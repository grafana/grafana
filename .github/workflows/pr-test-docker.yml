name: Test Dockerfile

permissions: {}

on:
  pull_request:
    # Include ready_for_review so the draft gate below re-evaluates when a draft
    # is marked ready without a new push (default types omit that event).
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - Makefile
      - Dockerfile
      - public/**
      - packages/**
      - apps/**
      - '**/go.mod'
      - '**/go.sum'
      - '**/go.work'
      - '**/go.work.sum'
      - '**/package.json'
      - '**/nx.json'
      - '**/project.json'
      - '**/yarn.lock'
      - conf/**
      - .yarnrc.yml
      - .yarn/**
      - tsconfig.json
      - '**.js'
      - '*.ts'
      - '**.config.ts'
      - scripts/**
      - emails/**
      - .citools/**
      - kinds/**
      - embed.go
      - packaging/docker/**
      - .github/workflows/pr-test-docker.yml
      - .github/workflows/build-docker-variants.yml

jobs:
  # Gate the (expensive) build jobs: skip on draft PRs and on PRs that only
  # touch tests, since neither changes the built Docker image.
  detect-changes:
    name: Detect whether the Docker image build is affected
    # Skip draft PRs entirely: no detect-changes runner, no build jobs.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-arm64-small
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.detect-changes.outputs.docker-build }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true # required to get more history in the changed-files action
          fetch-depth: 0
          filter: blob:none
      - name: Detect changes
        id: detect-changes
        uses: ./.github/actions/change-detection
        with:
          self: .github/workflows/pr-test-docker.yml

  # ── Path 1 ────────────────────────────────────────────────────────────────
  # Full source build inside Docker. Validates that the complete compilation
  # pipeline (go-builder + js-builder + final stage) works end-to-end.
  build-full:
    name: build / full source (alpine)
    needs: detect-changes
    if: needs.detect-changes.outputs.changed == 'true'
    runs-on: ubuntu-x64-large
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: docker/setup-docker-action@6d7cfa65f60a9dda7b46e5513fa982536f3c9877 # v4
      - name: Set up Docker Buildx
        run: docker buildx create --use
      - name: Login to DockerHub
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        uses: grafana/shared-workflows/actions/dockerhub-login@dockerhub-login/v1.0.4
      - name: Build alpine (full source)
        run: make build-docker-full DOCKER_BUILD_ARGS=--load

  # ── Path 2 ────────────────────────────────────────────────────────────────
  # Prod-like build: compile frontend + backend in parallel → assemble tarball
  # → build all 6 Docker variants. Mirrors the release-build.yml structure so
  # the same code paths are exercised on every PR.

  build-frontend:
    name: build / frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.changed == 'true'
    runs-on: ubuntu-x64-large
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node
      - name: Install JS dependencies
        run: yarn install --immutable
      - name: Build frontend
        run: yarn build
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: pr-frontend
          path: public
          retention-days: 1

  build-backend:
    name: build / backend (linux-amd64)
    needs: detect-changes
    if: needs.detect-changes.outputs.changed == 'true'
    runs-on: ubuntu-x64-large
    permissions:
      contents: read
    outputs:
      version: ${{ steps.build.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - id: build
        uses: ./.github/actions/build-go
        with:
          build-number: ${{ github.run_id }}
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: pr-backend-linux-amd64
          path: bin/linux/amd64
          retention-days: 1

  build-source-targz:
    name: build / source tarball
    runs-on: ubuntu-x64-large
    needs:
      - build-frontend
      - build-backend
    permissions:
      contents: read
    outputs:
      version: ${{ needs.build-backend.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/build-targz
        with:
          build-number: ${{ github.run_id }}
          build-version: ${{ needs.build-backend.outputs.version }}
          frontend-artifact: pr-frontend
          backend-artifact: pr-backend-linux-amd64
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: pr-source-targz
          path: dist/*.tar.gz
          retention-days: 1

  build-docker-variants:
    name: build / variants (targz)
    needs: build-source-targz
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/build-docker-variants.yml
    with:
      targz-artifact-name: pr-source-targz
      name: linux-amd64
      os: linux
      arch: amd64
      arch-tag: amd64
      version: ${{ needs.build-source-targz.outputs.version }}
      build-number: ${{ github.run_id }}
