name: Externalized Data Sources Reminder

on:
  pull_request:
    types: [opened]
    paths:
      - "packages/grafana-prometheus/**"
      - "public/app/plugins/datasource/cloudwatch/**"
      - "public/app/plugins/datasource/cloud-monitoring/**"
      - "public/app/plugins/datasource/graphite/**"
      - "public/app/plugins/datasource/influxdb/**"
      - "public/app/plugins/datasource/zipkin/**"
      - "public/app/plugins/datasource/opentsdb/**"
      - "public/app/plugins/datasource/tempo/**"
      - "pkg/tsdb/cloudwatch/**"
      - "pkg/tsdb/cloud-monitoring/**"
      - "pkg/tsdb/graphite/**"
      - "pkg/tsdb/influxdb/**"
      - "pkg/tsdb/zipkin/**"
      - "pkg/tsdb/opentsdb/**"
      - "pkg/tsdb/tempo/**"

jobs:
  add-comment:
    if: ${{ ! github.event.pull_request.head.repo.fork }}
    runs-on: ubuntu-x64-small
    permissions:
      pull-requests: write
    steps:
      - uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          message: |
            This PR changed externalized data source code.

            Please also update the external data source repositories as needed.
            If you already handled this, feel free to ignore.
