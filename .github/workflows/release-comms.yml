# This workflow runs whenever the release PR is merged. It includes post-release communication processes like
# posting to slack, the website, community forums, etc.
# Only things that happen after a release is completed and all of the necessary code changes (like the changelog) are made.
name: Post-release
on:
  workflow_dispatch:
    inputs:
      dry_run:
        required: false
        default: true
        type: boolean
      version:
        required: true
      latest:
        type: boolean
        default: false
  pull_request:
    types:
    - closed
    branches:
    - 'main'
    - 'release-*.*.*'

permissions:
  contents: read

jobs:
  setup:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && startsWith(github.head_ref, 'release/')) }}
    name: Setup and establish latest
    outputs:
      version: ${{ steps.output.outputs.version }}
      release_branch: ${{ steps.output.outputs.release_branch }}
      dry_run: ${{ steps.output.outputs.dry_run }}
      latest: ${{ steps.output.outputs.latest }}
      build_id: ${{ steps.output.outputs.build_id }}
    env:
      HEAD_REF: ${{ github.head_ref }}
      DRY_RUN: ${{ inputs.dry_run }}
      LATEST: ${{ inputs.latest && '1' || '0' }}
      VERSION: ${{ inputs.version }}
    runs-on: ubuntu-arm64-small
    steps:
    - if: ${{ github.event.pull_request.merged == true && startsWith(github.head_ref, 'release/') }}
      # PR_BODY is read via env (not interpolated into the script) to avoid template injection. The
      # automated public-release PR embeds "<!-- release-build-id: <id> -->"; manual PRs won't have it.
      env:
        PR_BODY: ${{ github.event.pull_request.body }}
      run: |
        {
        echo "VERSION=$(echo "${HEAD_REF}" | sed -e 's/release\/.*\//v/g')"
        echo "DRY_RUN=${{ contains(github.event.pull_request.labels.*.name, 'release/dry-run') }}"
        echo "LATEST=${{ contains(github.event.pull_request.labels.*.name, 'release/latest') && '1' || '0' }}"
        echo "BUILD_ID=$(printf '%s' "$PR_BODY" | sed -nE 's/.*release-build-id: ([0-9]+).*/\1/p' | head -n1)"
        } >> "$GITHUB_ENV"
    - id: output
      run: |
        echo "dry_run: $DRY_RUN"
        echo "latest: $LATEST"
        echo "version: $VERSION"
        echo "build_id: ${BUILD_ID:-}"

        {
          echo "release_branch=$(echo "$VERSION" | sed -s 's/^v/release-/g')"
          echo "dry_run=$DRY_RUN"
          echo "latest=$LATEST"
          echo "version=$VERSION"
          echo "build_id=${BUILD_ID:-}"
        } >> "$GITHUB_OUTPUT"
  create_next_release_branch_grafana:
    name: Create next release branch (Grafana)
    needs: setup
    # Security releases don't open a new patch development branch: the next branch is the
    # incremented +security-NN created below, not a version bump.
    if: ${{ !contains(needs.setup.outputs.version, '+security') }}
    permissions:
      contents: read
      id-token: write
    uses: grafana/grafana/.github/workflows/create-next-release-branch.yml@main
    with:
      ownerRepo: 'grafana/grafana'
      source: ${{ needs.setup.outputs.release_branch }}
  create_next_release_branch_enterprise:
    name: Create next release branch (Grafana Enterprise)
    needs: setup
    if: ${{ !contains(needs.setup.outputs.version, '+security') }}
    permissions:
      contents: read
      id-token: write
    uses: grafana/grafana/.github/workflows/create-next-release-branch.yml@main
    with:
      ownerRepo: 'grafana/grafana-enterprise'
      source: ${{ needs.setup.outputs.release_branch }}
  create_security_branch_grafana:
    name: Create security branch (Grafana Security Mirror)
    needs: setup
    permissions:
      contents: read
      id-token: write
    uses: grafana/grafana/.github/workflows/create-security-branch.yml@main
    with:
      release_branch: ${{ needs.setup.outputs.release_branch }}
      security_branch_number: "01"
      repository: grafana/grafana-security-mirror
  create_security_branch_enterprise:
    name: Create security branch (Enterprise)
    needs: setup
    permissions:
      contents: read
      id-token: write
    uses: grafana/grafana/.github/workflows/create-security-branch.yml@main
    with:
      release_branch: ${{ needs.setup.outputs.release_branch }}
      security_branch_number: "01"
      repository: grafana/grafana-enterprise
  migrate_prs_grafana:
    needs:
      - setup
      - create_next_release_branch_grafana
    # No next branch is created for security releases, so there is nothing to migrate to.
    if: ${{ !contains(needs.setup.outputs.version, '+security') }}
    permissions:
      contents: read
      id-token: write
    uses: grafana/grafana/.github/workflows/migrate-prs.yml@main
    with:
      ownerRepo: 'grafana/grafana'
      from: ${{ needs.setup.outputs.release_branch }}
      to: ${{ needs.create_next_release_branch_grafana.outputs.branch }}
  migrate_prs_enterprise:
    needs:
      - setup
      - create_next_release_branch_enterprise
    if: ${{ !contains(needs.setup.outputs.version, '+security') }}
    permissions:
      contents: read
      id-token: write
    uses: grafana/grafana/.github/workflows/migrate-prs.yml@main
    with:
      ownerRepo: 'grafana/grafana-enterprise'
      from: ${{ needs.setup.outputs.release_branch }}
      to: ${{ needs.create_next_release_branch_enterprise.outputs.branch }}
  # Removed this for now since it doesn't work
  # post_changelog_on_forum:
  #   needs: setup
  #   uses: grafana/grafana/.github/workflows/community-release.yml@main
  #   with:
  #     version: ${{ needs.setup.outputs.version }}
  #     dry_run: ${{ needs.setup.outputs.dry_run == 'true' }}
  create_github_release:
    # a github release requires a git tag
    # The github-release action retrieves the changelog using the /repos/grafana/grafana/contents/CHANGELOG.md API
    # endpoint.
    needs: setup
    permissions:
      contents: write
      id-token: write
    uses: grafana/grafana/.github/workflows/github-release.yml@main
    with:
      version: ${{ needs.setup.outputs.version }}
      dry_run: ${{ needs.setup.outputs.dry_run == 'true' }}
      latest: ${{ needs.setup.outputs.latest }}

  # Attach this build's deb/rpm to the GitHub release so the external apt/yum repo-sync can consume
  # them. Only runs for the automated public-release path (build_id embedded in the PR body); the
  # manual/private path keeps publishing apt/yum inline and carries no build_id, so this is skipped.
  # Sources packages from dl.grafana.com (no GCS) and verifies each checksum against the gcom public
  # packages API before uploading. RPMs are the signed ones served by dl.grafana.com.
  attach_release_packages:
    name: Attach Linux packages to the GitHub release
    needs:
      - setup
      - create_github_release
    if: ${{ needs.setup.outputs.build_id != '' && needs.setup.outputs.dry_run != 'true' && !contains(needs.setup.outputs.version, '+security') }}
    runs-on: ubuntu-arm64-small
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.setup.outputs.version }}
      BUILD_ID: ${{ needs.setup.outputs.build_id }}
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download, verify checksums, and attach deb/rpm
        run: |
          set -euo pipefail

          version="${VERSION#v}"   # gcom API + dl.grafana.com filenames use the bare version
          tag="v${version}"        # the GitHub release tag

          workdir="$(mktemp -d)"
          files=()

          for product in grafana grafana-enterprise; do
            api="https://grafana.com/api/${product}/versions/${version}/packages"
            echo "Reading package manifest: ${api}"
            # The gcom public packages API is the authoritative manifest: each entry has url
            # (dl.grafana.com) + sha256. Select only THIS build's deb/rpm — the new build_id-keyed
            # filenames contain _<build_id>_, which also excludes any stale/old-format entries.
            manifest="$(curl -fsSL "$api")"
            count="$(printf '%s' "$manifest" | jq '(.items // .) | length')"

            i=0
            while [ "$i" -lt "$count" ]; do
              url="$(printf '%s' "$manifest" | jq -r "(.items // .)[$i].url")"
              sha="$(printf '%s' "$manifest" | jq -r "(.items // .)[$i].sha256" | tr -d '[:space:]')"
              i=$((i + 1))

              case "$url" in
                *_"${BUILD_ID}"_*.deb | *_"${BUILD_ID}"_*.rpm) ;;
                *) continue ;;
              esac

              fname="$(basename "$url")"
              dest="${workdir}/${fname}"
              echo "Downloading ${url}"
              curl -fsSL -o "$dest" "$url"

              actual="$(sha256sum "$dest" | awk '{print $1}')"
              if [ "$actual" != "$sha" ]; then
                echo "::error::checksum mismatch for ${fname}: expected '${sha}', got '${actual}'"
                exit 1
              fi
              echo "verified ${fname}"
              files+=("$dest")
            done
          done

          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::no deb/rpm found for build ${BUILD_ID} of ${version} in the gcom manifest"
            exit 1
          fi

          echo "Uploading ${#files[@]} package(s) to release ${tag}..."
          gh release upload "$tag" "${files[@]}" --clobber --repo "$GH_REPO"

  post_on_slack:
    needs: setup
    runs-on: ubuntu-arm64-small
    env:
      DRY_RUN: ${{ needs.setup.outputs.dry_run }}
      VERSION: ${{ needs.setup.outputs.version }}
    steps:
    - run: |
        echo announce on slack that "$VERSION" has been released
        echo dry run: "$DRY_RUN"
