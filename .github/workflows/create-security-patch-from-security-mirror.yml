# Owned by grafana-backend-services-squad
# Intended to be dropped into the base repo (Ex: grafana/grafana) for use in the security mirror.
name: Create security patch
run-name: create-security-patch
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      # edited (title/description) and (un)labeled (VUL ID / backport targets) regenerate
      # the patch so the patch repo stays in sync with the mirror PR.
      - edited
      - labeled
      - unlabeled
    branches:
      - "main"
      - "v*.*.*"
      - "release-*.*.*"

concurrency:
  group: create-patch-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  # Dispatch create-patch via REST API rather than workflow_call. The previous
  # workflow_call approach relied on get-vault-secrets + tibdex inside the called
  # workflow (which is no longer permitted); switching to createWorkflowDispatch lets
  # the called workflow use the per-workflow token broker (create-github-app-token).
  dispatch-create-patch:
    if: ${{ github.repository == 'grafana/grafana-security-mirror' }}
    runs-on: ubuntu-arm64-small
    permissions:
      id-token: write
      contents: read
      pull-requests: write # post the sticky status comment back on the mirror PR
    env:
      REPO: ${{ github.repository }}
      SRC_REF: ${{ github.head_ref }}
      PATCH_REF: ${{ github.base_ref }}
      PATCH_PREFIX: ${{ github.event.pull_request.number }}
      SENDER: ${{ github.event.pull_request.user.login }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      # Resolve the VUL ID and backport targets from the PR. The VUL ID can come from a
      # `VUL-YYYY-NNNN` label (preferred — added for searchability) or, failing that, the
      # required `GL-Vuln: VUL-YYYY-NNNN` trailer in the PR description (the canonical source
      # enforced by grafana-security-patches' validate-patch-trailers). `backport <branch>`
      # labels list extra branches to copy the patch into.
      - name: Resolve VUL ID and backport targets
        id: labels
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = (pr.labels || []).map(l => l.name);

            const fromLabel = labels.find(n => /^VUL-\d{4}-\d{4}$/.test(n));
            const fromTrailer = (pr.body || '').match(/^GL-Vuln:\s*(VUL-\d{4}-\d{4})\b/im);
            const vulId = fromLabel || (fromTrailer && fromTrailer[1]) || '';

            const base = process.env.PATCH_REF;
            const backports = [...new Set(
              labels
                .filter(n => /^backport\s+\S+/i.test(n))
                .map(n => n.replace(/^backport\s+/i, '').trim())
                .filter(b => b && b !== base)
            )];
            core.setOutput('vul_id', vulId);
            core.setOutput('backport_refs', backports.join(' '));

      # Without a VUL ID we can't name or de-duplicate the patch. Tell the author and stop
      # (success, not failure — a missing label isn't an error, just nothing to do yet).
      - name: Comment when VUL ID is missing
        if: ${{ steps.labels.outputs.vul_id == '' }}
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: '🔐 No VUL ID found on this PR, so no security patch was generated. '
                + 'Add a `VUL-YYYY-NNNN` label or a `GL-Vuln: VUL-YYYY-NNNN` trailer to the description '
                + '(and any `backport <branch>` labels) to trigger patch creation.',
            });

      - name: Get GitHub App token
        if: ${{ steps.labels.outputs.vul_id != '' }}
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: grafana-releases-oss

      - name: Dispatch create-patch in security-patch-actions
        if: ${{ steps.labels.outputs.vul_id != '' }}
        uses: actions/github-script@v8
        env:
          COMMENT: "Closes: ${{ github.repository }}#${{ github.event.pull_request.number }}"
          VUL_ID: ${{ steps.labels.outputs.vul_id }}
          BACKPORT_REFS: ${{ steps.labels.outputs.backport_refs }}
        with:
          github-token: ${{ steps.get-github-app-token.outputs.token }}
          script: |
            const {REPO, SRC_REF, PATCH_REF, PATCH_PREFIX, SENDER, COMMENT, VUL_ID, BACKPORT_REFS} = process.env;
            await github.rest.actions.createWorkflowDispatch({
              owner: 'grafana',
              repo: 'security-patch-actions',
              workflow_id: 'create-patch.yml',
              ref: 'main',
              inputs: {
                repo: REPO,
                src_ref: SRC_REF,
                patch_ref: PATCH_REF,
                patch_repo: 'grafana/grafana-security-patches',
                patch_prefix: PATCH_PREFIX,
                vul_id: VUL_ID,
                backport_refs: BACKPORT_REFS,
                sender: SENDER,
                comment: COMMENT,
              },
            })

      # Sticky status comment so the mirror PR author can see what was dispatched and where
      # to look. Updated in place on each run rather than posting a new comment every time.
      - name: Update status comment
        if: ${{ steps.labels.outputs.vul_id != '' }}
        uses: actions/github-script@v8
        env:
          VUL_ID: ${{ steps.labels.outputs.vul_id }}
          BACKPORT_REFS: ${{ steps.labels.outputs.backport_refs }}
        with:
          script: |
            const {VUL_ID, BACKPORT_REFS, PATCH_REF, PR_NUMBER} = process.env;
            const targets = [PATCH_REF, ...(BACKPORT_REFS ? BACKPORT_REFS.split(' ') : [])];
            const runsUrl = 'https://github.com/grafana/security-patch-actions/actions/workflows/create-patch.yml';
            const marker = '<!-- security-patch-status -->';
            const body = [
              marker,
              `🔐 **Security patch dispatched** for \`${VUL_ID}\``,
              '',
              `Targets: ${targets.map(t => `\`${t}\``).join(', ')}`,
              '',
              `Patch generation is running in [security-patch-actions](${runsUrl}). `
                + `The PR in \`grafana-security-patches\` will appear/update on branch \`patch/${VUL_ID}\`.`,
            ].join('\n');
            const {data: comments} = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: Number(PR_NUMBER),
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: Number(PR_NUMBER), body,
              });
            }
