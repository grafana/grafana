# Owned by grafana-backend-services-squad
# Intended to be dropped into the base repo (Ex: grafana/grafana) for use in the security mirror.
name: Create security patch
run-name: create-security-patch
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - "main"
      - "v*.*.*"
      - "release-*.*.*"

concurrency:
  group: create-patch-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  # Dispatch create-patch via REST API rather than workflow_call. The previous
  # workflow_call approach relied on get-vault-secrets + tibdex inside the called
  # workflow (which is no longer permitted); switching to createWorkflowDispatch lets
  # the called workflow use the per-workflow token broker (create-github-app-token).
  dispatch-create-patch:
    timeout-minutes: 15
    if: ${{ github.repository == 'grafana/grafana-security-mirror' }}
    runs-on: ubuntu-arm64-small
    permissions:
      id-token: write
      contents: read
    env:
      REPO: ${{ github.repository }}
      SRC_REF: ${{ github.head_ref }}
      PATCH_REF: ${{ github.base_ref }}
      PATCH_PREFIX: ${{ github.event.pull_request.number }}
      SENDER: ${{ github.event.pull_request.user.login }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: grafana-releases-oss
      - name: Dispatch create-patch in security-patch-actions
        uses: actions/github-script@v8
        env:
          COMMENT: "Closes: ${{ github.repository }}#${{ github.event.pull_request.number }}"
        with:
          github-token: ${{ steps.get-github-app-token.outputs.token }}
          script: |
            const {REPO, SRC_REF, PATCH_REF, PATCH_PREFIX, SENDER, COMMENT} = process.env;
            await github.rest.actions.createWorkflowDispatch({
              owner: 'grafana',
              repo: 'security-patch-actions',
              workflow_id: 'create-patch.yml',
              ref: 'main',
              inputs: {
                repo: REPO,
                src_ref: SRC_REF,
                patch_ref: PATCH_REF,
                patch_repo: 'grafana/grafana-security-patches',
                patch_prefix: PATCH_PREFIX,
                sender: SENDER,
                comment: COMMENT,
              },
            })
