name: Compare Build Performance (Dagger vs Buildx Bake)

on:
  push:
    branches:
      - km/test-docker-buildx

permissions:
  contents: read

jobs:
  dagger:
    name: Dagger (targz only)
    runs-on: github-hosted-ubuntu-x64-large
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: ./.github/actions/build-package
        with:
          artifacts: targz:grafana:linux/amd64,targz:grafana:linux/arm64,targz:grafana:linux/s390x,targz:grafana:linux/arm/v7
          grafana-path: .
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: ""
          build-id: ${{ github.run_id }}
          cache-builders: false
          verify: false

  buildx-bake:
    name: Buildx Bake (single job)
    runs-on: github-hosted-ubuntu-x64-large
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@7e10951aea186e886cef2f1a25a7bbf4e593d710
        with:
          image: docker.io/tonistiigi/binfmt:qemu-v10.2.1-65

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all platforms
        env:
          COMMIT_SHA: ${{ github.sha }}
          BUILD_BRANCH: ${{ github.ref_name }}
        run: docker buildx bake release

  buildx-matrix:
    name: Buildx Matrix / ${{ matrix.platform }}
    runs-on: github-hosted-ubuntu-x64-large
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            name: linux-amd64
          - platform: linux/arm64
            name: linux-arm64
          - platform: linux/arm/v7
            name: linux-armv7
          - platform: linux/s390x
            name: linux-s390x
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@7e10951aea186e886cef2f1a25a7bbf4e593d710
        with:
          image: docker.io/tonistiigi/binfmt:qemu-v10.2.1-65

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        env:
          COMMIT_SHA: ${{ github.sha }}
          BUILD_BRANCH: ${{ github.ref_name }}
        run: |
          docker buildx bake \
            --set "grafana.platform=${{ matrix.platform }}" \
            --set "grafana.output=type=oci,dest=grafana-${{ matrix.name }}.tar" \
            grafana

      - uses: actions/upload-artifact@v4
        with:
          name: docker-${{ matrix.name }}
          path: "*.tar"
          retention-days: 1

  buildx-collect:
    name: Buildx Matrix / Collect
    runs-on: ubuntu-latest
    needs: [buildx-matrix]
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
          buildkitd-config-inline: |
            [registry."localhost:5000"]
              http = true

      - uses: actions/download-artifact@v4
        with:
          pattern: docker-*
          path: images

      - name: List images
        run: ls -lh images/**/*.tar

      - name: Install skopeo
        run: sudo apt-get update && sudo apt-get install -y skopeo

      - name: Push platform images to local registry
        run: |
          for tar in images/**/*.tar; do
            name=$(basename "$tar" .tar)
            skopeo copy --dest-tls-verify=false \
              "oci-archive:${tar}" \
              "docker://localhost:5000/grafana:${name}"
          done

      - name: Create multi-arch manifest
        run: |
          sources=""
          for tar in images/**/*.tar; do
            name=$(basename "$tar" .tar)
            sources="$sources localhost:5000/grafana:${name}"
          done
          docker buildx imagetools create \
            --tag localhost:5000/grafana:latest \
            $sources

      - name: Inspect multi-arch image
        run: docker buildx imagetools inspect localhost:5000/grafana:latest

  split-frontend:
    name: Split / Frontend
    runs-on: github-hosted-ubuntu-x64-large
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build frontend
        run: yarn build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-public
          path: public/build
          retention-days: 1

  split-backend:
    name: Split / Backend (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: github-hosted-ubuntu-x64-large
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: s390x
          - goos: linux
            goarch: arm
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: Download Go modules
        run: go mod download

      - name: Build backend
        run: make build-go GO_BUILD_TAGS=oss GO_BUILD_OS=${{ matrix.goos }} GO_BUILD_ARCH=${{ matrix.goarch }}
        env:
          CGO_ENABLED: '0'

      - uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/
          retention-days: 1

  split-collect:
    name: Split / Collect
    runs-on: ubuntu-latest
    needs: [split-frontend, split-backend]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '{frontend-*,backend-*}'
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort
