name: Migrate open PRs
# Migrate open PRs from a superseded release branch to the current release branch and notify authors
on:
  workflow_call:
    inputs:
      from:
        description: 'The base branch to check for open PRs'
        required: true
        type: string
      to:
        description: 'The base branch to migrate open PRs to'
        required: true
        type: string
      ownerRepo:
        description: Owner/repo of the repository where the branch is created (e.g. 'grafana/grafana')
        required: true
        type: string
  workflow_dispatch:
    inputs:
      from:
        description: 'The base branch to check for open PRs'
        required: true
        type: string
      to:
        description: 'The base branch to migrate open PRs to'
        required: true
        type: string
      ownerRepo:
        description: Owner/repo of the repository where the branch is created (e.g. 'grafana/grafana')
        required: true
        type: string


# Prevent concurrent runs of the same workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  main:
    timeout-minutes: 15
    runs-on: ubuntu-arm64-small
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: grafana-pr-automation
          permission_set: ${{ startsWith(github.ref_name, 'release-') && 'pr-writer-release' || 'pr-writer-main' }}
      - name: Migrate PRs
        uses: grafana/grafana-github-actions-go/migrate-open-prs@main
        with:
          token: ${{ steps.get-github-app-token.outputs.token }}
          ownerRepo: ${{ inputs.ownerRepo }}
          from: ${{ inputs.from }}
          to: ${{ inputs.to }}
          binary_release_tag: 'dev'
