name: Documentation CI
on:
  pull_request:
    branches: ["main"]
    paths: ["docs/sources/**"]
  workflow_dispatch:


# Prevent concurrent runs of the same workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  vale:
    timeout-minutes: 15
    runs-on: ubuntu-x64-small
    permissions:
      contents: read
      pull-requests: write
    container:
      image: grafana/vale:latest # zizmor: ignore[unpinned-images]
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: grafana/writers-toolkit/vale-action@vale-action/v2 # zizmor: ignore[unpinned-uses]
        with:
          fail_on_error: "false"
          filter: '.Name in ["Grafana.GrafanaCom", "Grafana.WordList", "Grafana.Spelling", "Grafana.ProductPossessives"]'
          token: ${{ secrets.GITHUB_TOKEN }}
