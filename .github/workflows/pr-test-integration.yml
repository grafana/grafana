name: Integration Tests

on:
  push:
    branches:
      - main
      - release-*.*.*
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - Makefile
      - '**/go.mod'
      - '**/go.sum'
      - '**/go.work'
      - '**/go.work.sum'
      - '**.go'
      - pkg/**
      - apps/**
      - scripts/ci/backend-tests/**
      - devenv/**
      - .github/actions/setup-go/**
      - .github/actions/setup-enterprise/**
      - .github/workflows/pr-test-integration.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

permissions: {}

jobs:
  detect-changes:
    # Run on `grafana/grafana` main branch, or on pull requests to prevent double-running on mirrors
    if: (github.event_name == 'pull_request' || (github.event_name == 'push' && github.repository == 'grafana/grafana'))
    name: Detect whether code changed
    runs-on: ubuntu-arm64-small
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.detect-changes.outputs.backend }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true # required to get more history in the changed-files action
          fetch-depth: 0
          filter: blob:none
      - name: Detect changes
        id: detect-changes
        uses: ./.github/actions/change-detection
        with:
          self: .github/workflows/pr-test-integration.yml

  #### Compile (once) — populates a shared Go build cache that the sharded test
  #### jobs restore, so they skip recompiling the integration test suite.
  #### Only one variant runs per event: OSS for fork PRs, Enterprise otherwise.
  compile-oss:
    # Run this workflow only for PRs from forks
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
    name: Compile OSS integration tests
    runs-on: ubuntu-x64-2xlarge
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          # We manage GOCACHE ourselves below so it can be shared with the shards.
          cache-build: 'false'
      - name: Resolve GOCACHE path
        run: echo "GOCACHE=$(go env GOCACHE)" >> "$GITHUB_ENV"
      - name: Restore/Save Go build cache
        uses: actions/cache@v5 # zizmor: ignore[cache-poisoning] key is scoped to the immutable commit SHA
        with:
          path: ${{ env.GOCACHE }}
          key: gocache-int-oss-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            gocache-int-oss-${{ runner.os }}-
      - name: Compile all integration test binaries
        env:
          CGO_ENABLED: 0
        run: |
          set -euo pipefail
          readarray -t PACKAGES <<< "$(./scripts/ci/backend-tests/pkgs-with-tests-named.sh -b TestIntegration)"
          go test -run='^$' "${PACKAGES[@]}"

  compile-enterprise:
    # Run this workflow for non-PR events (like pushes to `main` or `release-*`) OR for internal PRs (PRs not from forks)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    name: Compile Enterprise integration tests
    runs-on: ubuntu-x64-2xlarge
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: grafana-ci-bot
      - name: Setup Enterprise
        uses: ./.github/actions/setup-enterprise
        with:
          token: ${{ steps.get-github-app-token.outputs.token }}
      # Enterprise must be cloned before setup-go so that enterprise
      # modules are visible when the Go cache key is computed.
      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          # We manage GOCACHE ourselves below so it can be shared with the shards.
          cache-build: 'false'
      - name: Resolve GOCACHE path
        run: echo "GOCACHE=$(go env GOCACHE)" >> "$GITHUB_ENV"
      - name: Restore/Save Go build cache
        uses: actions/cache@v5 # zizmor: ignore[cache-poisoning] key is scoped to the immutable commit SHA
        with:
          path: ${{ env.GOCACHE }}
          key: gocache-int-enterprise-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            gocache-int-enterprise-${{ runner.os }}-
      - name: Compile all integration test binaries
        env:
          CGO_ENABLED: 0
        run: |
          set -euo pipefail
          readarray -t PACKAGES <<< "$(./scripts/ci/backend-tests/pkgs-with-tests-named.sh -b TestIntegration)"
          go test -tags=enterprise -run='^$' "${PACKAGES[@]}"

  #### OSS
  sqlite:
    # Run this workflow only for PRs from forks
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
    needs: compile-oss
    strategy:
      matrix:
        # We don't need more than this since it has to wait for the other tests.
        shard: [
          1/4, 2/4, 3/4, 4/4,
        ]
      fail-fast: false

    name: Sqlite (${{ matrix.shard }})
    runs-on: ubuntu-x64-large-io
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          # GOCACHE is restored from the shared cache populated by compile-oss.
          cache-build: 'false'
      - name: Resolve GOCACHE path
        run: echo "GOCACHE=$(go env GOCACHE)" >> "$GITHUB_ENV"
      - name: Restore Go build cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.GOCACHE }}
          key: gocache-int-oss-${{ runner.os }}-${{ github.sha }}
      - name: Run tests
        env:
          SHARD: ${{ matrix.shard }}
          CGO_ENABLED: 0
        run: |
          set -euo pipefail
          readarray -t PACKAGES <<< "$(./scripts/ci/backend-tests/pkgs-with-tests-named.sh -b TestIntegration | ./scripts/ci/backend-tests/shard.sh -N "$SHARD" -d -)"
          go test -timeout=12m -run '^TestIntegration' "${PACKAGES[@]}"

  mysql:
    # Run this workflow only for PRs from forks
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
    needs: compile-oss
    strategy:
      matrix:
        shard: [
           1/16,  2/16,  3/16,  4/16,
           5/16,  6/16,  7/16,  8/16,
           9/16, 10/16, 11/16, 12/16,
          13/16, 14/16, 15/16, 16/16,
        ]
      fail-fast: false

    name: MySQL (${{ matrix.shard }})
    runs-on: ubuntu-x64-large-io
    permissions:
      contents: read
    env:
      GRAFANA_TEST_DB: mysql
      MYSQL_HOST: 127.0.0.1
    services:
      mysql:
        image: mysql:8.0.43
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: grafana_tests
          MYSQL_USER: grafana
          MYSQL_PASSWORD: password
        options: --health-cmd="mysqladmin ping --silent" --health-interval=10s --health-timeout=5s --health-retries=3
        ports:
          - 3306:3306
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          # GOCACHE is restored from the shared cache populated by compile-oss.
          cache-build: 'false'
      - name: Resolve GOCACHE path
        run: echo "GOCACHE=$(go env GOCACHE)" >> "$GITHUB_ENV"
      - name: Restore Go build cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.GOCACHE }}
          key: gocache-int-oss-${{ runner.os }}-${{ github.sha }}
      - name: Setup MySQL devenv
        run: mysql -h 127.0.0.1 -P 3306 -u root -prootpass < devenv/docker/blocks/mysql_tests/setup.sql
      - name: Run tests
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          set -euo pipefail
          readarray -t PACKAGES <<< "$(./scripts/ci/backend-tests/pkgs-with-tests-named.sh -b TestIntegration | ./scripts/ci/backend-tests/shard.sh -N"$SHARD" -d-)"
          CGO_ENABLED=0 go test -p=1 -timeout=12m -run '^TestIntegration' "${PACKAGES[@]}"

  postgres:
    # Run this workflow only for PRs from forks
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
    needs: compile-oss
    strategy:
      matrix:
        shard: [
           1/16,  2/16,  3/16,  4/16,
           5/16,  6/16,  7/16,  8/16,
           9/16, 10/16, 11/16, 12/16,
          13/16, 14/16, 15/16, 16/16,
        ]
      fail-fast: false

    name: Postgres (${{ matrix.shard }})
    runs-on: ubuntu-x64-large-io
    permissions:
      contents: read
    env:
      GRAFANA_TEST_DB: postgres
      PGPASSWORD: grafanatest
      POSTGRES_HOST: 127.0.0.1
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Start Postgres via docker compose
        run: |
          make devenv sources=postgres_tests
      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          # GOCACHE is restored from the shared cache populated by compile-oss.
          cache-build: 'false'
      - name: Resolve GOCACHE path
        run: echo "GOCACHE=$(go env GOCACHE)" >> "$GITHUB_ENV"
      - name: Restore Go build cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.GOCACHE }}
          key: gocache-int-oss-${{ runner.os }}-${{ github.sha }}
      - name: Setup Postgres devenv
        run: psql -p 5432 -h 127.0.0.1 -U grafanatest -d grafanatest -f devenv/docker/blocks/postgres_tests/setup.sql
      - name: Run tests
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          set -euo pipefail
          readarray -t PACKAGES <<< "$(./scripts/ci/backend-tests/pkgs-with-tests-named.sh -b TestIntegration | ./scripts/ci/backend-tests/shard.sh -N"$SHARD" -d-)"
          CGO_ENABLED=0 go test -p=1 -timeout=12m -run '^TestIntegration' "${PACKAGES[@]}"
      - name: Cleanup Postgres
        if: always()
        run: |
          make devenv-down sources=postgres_tests

  #### Enterprise
  sqlite-enterprise:
    # Run this workflow for non-PR events (like pushes to `main` or `release-*`) OR for internal PRs (PRs not from forks)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    needs: compile-enterprise
    strategy:
      matrix:
        shard: [
           1/16,  2/16,  3/16,  4/16,
           5/16,  6/16,  7/16,  8/16,
           9/16, 10/16, 11/16, 12/16,
          13/16, 14/16, 15/16, 16/16,
        ]
      fail-fast: false

    name: Sqlite Enterprise (${{ matrix.shard }})
    runs-on: ubuntu-x64-large-io
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: grafana-ci-bot
      - name: Setup Enterprise
        uses: ./.github/actions/setup-enterprise
        with:
          token: ${{ steps.get-github-app-token.outputs.token }}
      # Enterprise must be cloned before setup-go so that enterprise
      # modules are visible when the Go cache key is computed.
      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          # GOCACHE is restored from the shared cache populated by compile-enterprise.
          cache-build: 'false'
      - name: Resolve GOCACHE path
        run: echo "GOCACHE=$(go env GOCACHE)" >> "$GITHUB_ENV"
      - name: Restore Go build cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.GOCACHE }}
          key: gocache-int-enterprise-${{ runner.os }}-${{ github.sha }}
      - name: Run tests
        env:
          SHARD: ${{ matrix.shard }}
          CGO_ENABLED: 0
        run: |
          set -euo pipefail
          readarray -t PACKAGES <<< "$(./scripts/ci/backend-tests/pkgs-with-tests-named.sh -b TestIntegration | ./scripts/ci/backend-tests/shard.sh -N "$SHARD" -d -)"
          go test -tags=enterprise -timeout=16m -run '^TestIntegration' "${PACKAGES[@]}"

  mysql-enterprise:
    # Run this workflow for non-PR events (like pushes to `main` or `release-*`) OR for internal PRs (PRs not from forks)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    needs: compile-enterprise
    strategy:
      matrix:
        shard: [
           1/16,  2/16,  3/16,  4/16,
           5/16,  6/16,  7/16,  8/16,
           9/16, 10/16, 11/16, 12/16,
          13/16, 14/16, 15/16, 16/16,
        ]
      fail-fast: false

    name: MySQL Enterprise (${{ matrix.shard }})
    runs-on: ubuntu-x64-large-io
    permissions:
      contents: read
      id-token: write
    env:
      GRAFANA_TEST_DB: mysql
      MYSQL_HOST: 127.0.0.1
    services:
      mysql:
        image: mysql:8.0.43
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: grafana_tests
          MYSQL_USER: grafana
          MYSQL_PASSWORD: password
        options: --health-cmd="mysqladmin ping --silent" --health-interval=10s --health-timeout=5s --health-retries=3
        ports:
          - 3306:3306
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: grafana-ci-bot
      - name: Setup Enterprise
        uses: ./.github/actions/setup-enterprise
        with:
          token: ${{ steps.get-github-app-token.outputs.token }}
      # Enterprise must be cloned before setup-go so that enterprise
      # modules are visible when the Go cache key is computed.
      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          # GOCACHE is restored from the shared cache populated by compile-enterprise.
          cache-build: 'false'
      - name: Resolve GOCACHE path
        run: echo "GOCACHE=$(go env GOCACHE)" >> "$GITHUB_ENV"
      - name: Restore Go build cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.GOCACHE }}
          key: gocache-int-enterprise-${{ runner.os }}-${{ github.sha }}
      - name: Setup MySQL devenv
        run: mysql -h 127.0.0.1 -P 3306 -u root -prootpass < devenv/docker/blocks/mysql_tests/setup.sql
      - name: Run tests
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          set -euo pipefail
          readarray -t PACKAGES <<< "$(./scripts/ci/backend-tests/pkgs-with-tests-named.sh -b TestIntegration | ./scripts/ci/backend-tests/shard.sh -N"$SHARD" -d-)"
          CGO_ENABLED=0 go test -p=1 -tags=enterprise -timeout=12m -run '^TestIntegration' "${PACKAGES[@]}"

  postgres-enterprise:
    # Run this workflow for non-PR events (like pushes to `main` or `release-*`) OR for internal PRs (PRs not from forks)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    needs: compile-enterprise
    strategy:
      matrix:
        shard: [
           1/16,  2/16,  3/16,  4/16,
           5/16,  6/16,  7/16,  8/16,
           9/16, 10/16, 11/16, 12/16,
          13/16, 14/16, 15/16, 16/16,
        ]
      fail-fast: false

    name: Postgres Enterprise (${{ matrix.shard }})
    runs-on: ubuntu-x64-large-io
    permissions:
      contents: read
      id-token: write
    env:
      GRAFANA_TEST_DB: postgres
      PGPASSWORD: grafanatest
      POSTGRES_HOST: 127.0.0.1
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Start Postgres via docker compose
        run: |
          make devenv sources=postgres_tests
      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: grafana-ci-bot
      - name: Setup Enterprise
        uses: ./.github/actions/setup-enterprise
        with:
          token: ${{ steps.get-github-app-token.outputs.token }}
      # Enterprise must be cloned before setup-go so that enterprise
      # modules are visible when the Go cache key is computed.
      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          # GOCACHE is restored from the shared cache populated by compile-enterprise.
          cache-build: 'false'
      - name: Resolve GOCACHE path
        run: echo "GOCACHE=$(go env GOCACHE)" >> "$GITHUB_ENV"
      - name: Restore Go build cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.GOCACHE }}
          key: gocache-int-enterprise-${{ runner.os }}-${{ github.sha }}
      - name: Setup Postgres devenv
        run: psql -p 5432 -h 127.0.0.1 -U grafanatest -d grafanatest -f devenv/docker/blocks/postgres_tests/setup.sql
      - name: Run tests
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          set -euo pipefail
          readarray -t PACKAGES <<< "$(./scripts/ci/backend-tests/pkgs-with-tests-named.sh -b TestIntegration | ./scripts/ci/backend-tests/shard.sh -N"$SHARD" -d-)"
          CGO_ENABLED=0 go test -p=1 -tags=enterprise -timeout=12m -run '^TestIntegration' "${PACKAGES[@]}"
      - name: Cleanup Postgres
        if: always()
        run: |
          make devenv-down sources=postgres_tests
