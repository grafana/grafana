name: Integration Tests

on:
  push:
    branches:
      - main
      - release-*.*.*
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - Makefile
      - '**/go.mod'
      - '**/go.sum'
      - '**/go.work'
      - '**/go.work.sum'
      - '**.go'
      - pkg/**
      - apps/**
      - scripts/ci/backend-tests/**
      - devenv/**
      - .github/actions/setup-go/**
      - .github/actions/setup-enterprise/**
      - .github/workflows/pr-test-integration.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

permissions: {}

jobs:
  detect-changes:
    # Run on `grafana/grafana` main branch, or on pull requests to prevent double-running on mirrors
    if: (github.event_name == 'pull_request' || (github.event_name == 'push' && github.repository == 'grafana/grafana'))
    name: Detect whether code changed
    runs-on: ubuntu-arm64-small
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.detect-changes.outputs.backend }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true # required to get more history in the changed-files action
          fetch-depth: 0
          filter: blob:none
      - name: Detect changes
        id: detect-changes
        uses: ./.github/actions/change-detection
        with:
          self: .github/workflows/pr-test-integration.yml

  #### OSS
  sqlite:
    # Run this workflow only for PRs from forks
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
    strategy:
      matrix:
        # We don't need more than this since it has to wait for the other tests.
        shard: [
          1/4, 2/4, 3/4, 4/4,
        ]
      fail-fast: false

    name: Sqlite (${{ matrix.shard }})
    runs-on: ubuntu-x64-large-io
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Setup Go
        uses: ./.github/actions/setup-go
      - name: Run tests
        env:
          SHARD: ${{ matrix.shard }}
          CGO_ENABLED: 0
        run: |
          set -euo pipefail
          readarray -t PACKAGES <<< "$(./scripts/ci/backend-tests/pkgs-with-tests-named.sh -b TestIntegration | ./scripts/ci/backend-tests/shard.sh -N "$SHARD" -d -)"
          go test -vet=off -timeout=12m -run '^TestIntegration' "${PACKAGES[@]}"

  mysql:
    # Run this workflow only for PRs from forks
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
    strategy:
      matrix:
        shard: [
           1/16,  2/16,  3/16,  4/16,
           5/16,  6/16,  7/16,  8/16,
           9/16, 10/16, 11/16, 12/16,
          13/16, 14/16, 15/16, 16/16,
        ]
      fail-fast: false

    name: MySQL (${{ matrix.shard }})
    runs-on: ubuntu-x64-large-io
    permissions:
      contents: read
    env:
      GRAFANA_TEST_DB: mysql
      MYSQL_HOST: 127.0.0.1
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Start MySQL via docker compose
        run: make devenv sources=mysql_tests mysql_version=8.0.43
      - name: Setup Go
        uses: ./.github/actions/setup-go
      - name: Wait for MySQL
        run: |
          for _ in $(seq 1 60); do
            mysql -h 127.0.0.1 -P 3306 -uroot -prootpass -e 'SELECT 1' >/dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "MySQL did not become ready in time" >&2
          exit 1
      - name: Run tests
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          set -euo pipefail
          readarray -t PACKAGES <<< "$(./scripts/ci/backend-tests/pkgs-with-tests-named.sh -b TestIntegration | ./scripts/ci/backend-tests/shard.sh -N"$SHARD" -d-)"
          echo "Precompiling, no tests will be run"
          CGO_ENABLED=0 go test -vet=off -run='^$' "${PACKAGES[@]}"
          echo "Running tests now"
          CGO_ENABLED=0 go test -vet=off -p=1 -timeout=12m -run '^TestIntegration' "${PACKAGES[@]}"
      - name: Cleanup MySQL
        if: always()
        run: make devenv-down sources=mysql_tests

  postgres:
    # Run this workflow only for PRs from forks
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
    strategy:
      matrix:
        shard: [
           1/16,  2/16,  3/16,  4/16,
           5/16,  6/16,  7/16,  8/16,
           9/16, 10/16, 11/16, 12/16,
          13/16, 14/16, 15/16, 16/16,
        ]
      fail-fast: false

    name: Postgres (${{ matrix.shard }})
    runs-on: ubuntu-x64-large-io
    permissions:
      contents: read
    env:
      GRAFANA_TEST_DB: postgres
      PGPASSWORD: grafanatest
      POSTGRES_HOST: 127.0.0.1
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Start Postgres via docker compose
        run: |
          make devenv sources=postgres_tests
      - name: Setup Go
        uses: ./.github/actions/setup-go
      - name: Setup Postgres devenv
        run: psql -p 5432 -h 127.0.0.1 -U grafanatest -d grafanatest -f devenv/docker/blocks/postgres_tests/setup.sql
      - name: Run tests
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          set -euo pipefail
          readarray -t PACKAGES <<< "$(./scripts/ci/backend-tests/pkgs-with-tests-named.sh -b TestIntegration | ./scripts/ci/backend-tests/shard.sh -N"$SHARD" -d-)"
          echo "Precompiling, no tests will be run"
          CGO_ENABLED=0 go test -vet=off -run='^$' "${PACKAGES[@]}"
          echo "Running tests now"
          CGO_ENABLED=0 go test -vet=off -p=1 -timeout=12m -run '^TestIntegration' "${PACKAGES[@]}"
      - name: Cleanup Postgres
        if: always()
        run: |
          make devenv-down sources=postgres_tests

  #### Enterprise
  sqlite-enterprise:
    # Run this workflow for pushes to `main` or `release-*` on `grafana/grafana` (not mirrors) OR for internal PRs (PRs not from forks)
    if: (github.event_name == 'push' && github.repository == 'grafana/grafana') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
    strategy:
      matrix:
        shard: [
           1/16,  2/16,  3/16,  4/16,
           5/16,  6/16,  7/16,  8/16,
           9/16, 10/16, 11/16, 12/16,
          13/16, 14/16, 15/16, 16/16,
        ]
      fail-fast: false

    name: Sqlite Enterprise (${{ matrix.shard }})
    runs-on: ubuntu-x64-large-io
    permissions:
      contents: read
      id-token: write
    env:
      PROFILE: ${{ github.event_name == 'push' || startsWith(github.head_ref, 'profile/') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: grafana-ci-bot
      - name: Setup Enterprise
        uses: ./.github/actions/setup-enterprise
        with:
          token: ${{ steps.get-github-app-token.outputs.token }}
      # Enterprise must be cloned before setup-go so that enterprise
      # modules are visible when the Go cache key is computed.
      - name: Setup Go
        uses: ./.github/actions/setup-go
      - name: Run tests
        env:
          SHARD: ${{ matrix.shard }}
          CGO_ENABLED: 0
        run: |
          set -euo pipefail
          readarray -t PACKAGES <<< "$(./scripts/ci/backend-tests/pkgs-with-tests-named.sh -b TestIntegration | ./scripts/ci/backend-tests/shard.sh -N "$SHARD" -d -)"
          if [ "$PROFILE" = "true" ]; then
            mkdir -p profiles
            PROFILE_DIR="$PWD/profiles" PROFILE_REPO_ROOT="$PWD" \
              go test -vet=off -tags=enterprise -timeout=16m -run '^TestIntegration' \
              -exec "$PWD/scripts/ci/backend-tests/profile-exec.sh" -json "${PACKAGES[@]}" \
              | tee test-output.json \
              | jq -Rrj 'fromjson? | select(.Action == "output").Output // empty'
            go run ./scripts/ci/backend-tests/profiling summarize profiles > profile-summary.jsonl
          else
            go test -vet=off -tags=enterprise -timeout=16m -run '^TestIntegration' "${PACKAGES[@]}"
          fi
      - name: Upload test timings
        if: always() && env.PROFILE == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: test-timings-sqlite-enterprise-${{ strategy.job-index }}
          path: |
            test-output.json
            profile-summary.jsonl
          if-no-files-found: ignore
          retention-days: 1

  mysql-enterprise:
    # Run this workflow for pushes to `main` or `release-*` on `grafana/grafana` (not mirrors) OR for internal PRs (PRs not from forks)
    if: (github.event_name == 'push' && github.repository == 'grafana/grafana') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
    strategy:
      matrix:
        shard: [
           1/16,  2/16,  3/16,  4/16,
           5/16,  6/16,  7/16,  8/16,
           9/16, 10/16, 11/16, 12/16,
          13/16, 14/16, 15/16, 16/16,
        ]
      fail-fast: false

    name: MySQL Enterprise (${{ matrix.shard }})
    runs-on: ubuntu-x64-large-io
    permissions:
      contents: read
      id-token: write
    env:
      GRAFANA_TEST_DB: mysql
      MYSQL_HOST: 127.0.0.1
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Start MySQL via docker compose
        run: make devenv sources=mysql_tests mysql_version=8.0.43
      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: grafana-ci-bot
      - name: Setup Enterprise
        uses: ./.github/actions/setup-enterprise
        with:
          token: ${{ steps.get-github-app-token.outputs.token }}
      # Enterprise must be cloned before setup-go so that enterprise
      # modules are visible when the Go cache key is computed.
      - name: Setup Go
        uses: ./.github/actions/setup-go
      - name: Wait for MySQL
        run: |
          for _ in $(seq 1 60); do
            mysql -h 127.0.0.1 -P 3306 -uroot -prootpass -e 'SELECT 1' >/dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "MySQL did not become ready in time" >&2
          exit 1
      - name: Run tests
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          set -euo pipefail
          readarray -t PACKAGES <<< "$(./scripts/ci/backend-tests/pkgs-with-tests-named.sh -b TestIntegration | ./scripts/ci/backend-tests/shard.sh -N"$SHARD" -d-)"
          echo "Precompiling, no tests will be run"
          CGO_ENABLED=0 go test -vet=off -tags=enterprise -run='^$' "${PACKAGES[@]}"
          echo "Running tests now"
          CGO_ENABLED=0 go test -vet=off -p=1 -tags=enterprise -timeout=12m -run '^TestIntegration' -json "${PACKAGES[@]}" \
            | tee test-output.json \
            | jq -Rrj 'fromjson? | select(.Action == "output").Output // empty'
      - name: Upload test timings
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-timings-mysql-enterprise-${{ strategy.job-index }}
          path: test-output.json
          if-no-files-found: ignore
          retention-days: 1
      - name: Cleanup MySQL
        if: always()
        run: make devenv-down sources=mysql_tests

  postgres-enterprise:
    # Run this workflow for pushes to `main` or `release-*` on `grafana/grafana` (not mirrors) OR for internal PRs (PRs not from forks)
    if: (github.event_name == 'push' && github.repository == 'grafana/grafana') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
    strategy:
      matrix:
        shard: [
           1/16,  2/16,  3/16,  4/16,
           5/16,  6/16,  7/16,  8/16,
           9/16, 10/16, 11/16, 12/16,
          13/16, 14/16, 15/16, 16/16,
        ]
      fail-fast: false

    name: Postgres Enterprise (${{ matrix.shard }})
    runs-on: ubuntu-x64-large-io
    permissions:
      contents: read
      id-token: write
    env:
      GRAFANA_TEST_DB: postgres
      PGPASSWORD: grafanatest
      POSTGRES_HOST: 127.0.0.1
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Start Postgres via docker compose
        run: |
          make devenv sources=postgres_tests
      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: grafana-ci-bot
      - name: Setup Enterprise
        uses: ./.github/actions/setup-enterprise
        with:
          token: ${{ steps.get-github-app-token.outputs.token }}
      # Enterprise must be cloned before setup-go so that enterprise
      # modules are visible when the Go cache key is computed.
      - name: Setup Go
        uses: ./.github/actions/setup-go
      - name: Setup Postgres devenv
        run: psql -p 5432 -h 127.0.0.1 -U grafanatest -d grafanatest -f devenv/docker/blocks/postgres_tests/setup.sql
      - name: Run tests
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          set -euo pipefail
          readarray -t PACKAGES <<< "$(./scripts/ci/backend-tests/pkgs-with-tests-named.sh -b TestIntegration | ./scripts/ci/backend-tests/shard.sh -N"$SHARD" -d-)"
          echo "Precompiling, no tests will be run"
          CGO_ENABLED=0 go test -vet=off -tags=enterprise -run='^$' "${PACKAGES[@]}"
          echo "Running tests now"
          CGO_ENABLED=0 go test -vet=off -p=1 -tags=enterprise -timeout=12m -run '^TestIntegration' -json "${PACKAGES[@]}" \
            | tee test-output.json \
            | jq -Rrj 'fromjson? | select(.Action == "output").Output // empty'
      - name: Upload test timings
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-timings-postgres-enterprise-${{ strategy.job-index }}
          path: test-output.json
          if-no-files-found: ignore
          retention-days: 1
      - name: Cleanup Postgres
        if: always()
        run: |
          make devenv-down sources=postgres_tests

  report-timings:
    name: Report test timings
    needs: [sqlite-enterprise, mysql-enterprise, postgres-enterprise]
    if: always() && ((github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false) || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    runs-on: ubuntu-arm64-small
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Download test timings
        uses: actions/download-artifact@v8
        with:
          pattern: test-timings-*
          path: timings
      - name: Download baseline timings from main
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          run_id=$(gh run list --workflow pr-test-integration.yml --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          if [ -n "$run_id" ]; then
            gh run download "$run_id" -n integration-test-timings -D baseline || true
          fi
      - name: Download previous run timings for this branch
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          BRANCH: ${{ github.head_ref }}
        run: |
          for run_id in $(gh run list --workflow pr-test-integration.yml --branch "$BRANCH" --status completed --limit 5 --json databaseId --jq '.[].databaseId'); do
            if gh run download "$run_id" -n integration-test-timings -D previous 2>/dev/null; then
              break
            fi
          done
      - name: Build report
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          ./scripts/ci/backend-tests/timing-report.sh timings timings.csv baseline/timings.csv previous/timings.csv > comment.md
          {
            echo ""
            echo "Full timings for all $(($(wc -l < timings.csv) - 1)) tests: [\`integration-test-timings\` artifact]($RUN_URL)"
          } >> comment.md
      - name: Upload full timings CSV
        uses: actions/upload-artifact@v5
        with:
          name: integration-test-timings
          path: timings.csv
      - name: Post comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          marker='<!-- integration-test-timings -->'
          comment_id=$(gh api "repos/$GH_REPO/issues/$PR_NUMBER/comments" --paginate \
            --jq ".[] | select(.body | startswith(\"$marker\")) | .id" | head -n1)
          if [ -n "$comment_id" ]; then
            gh api -X PATCH "repos/$GH_REPO/issues/comments/$comment_id" -F body=@comment.md
          else
            gh pr comment "$PR_NUMBER" --body-file comment.md
          fi
