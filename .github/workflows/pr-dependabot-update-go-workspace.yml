name: "Update Go Workspace for Dependabot PRs"
on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/pr-dependabot-update-go-workspace.yml
      - go.mod
      - go.sum
      - go.work
      - go.work.sum
      - '**/go.mod'
      - '**/go.sum'
      - '**.go'
permissions:
  contents: write
  id-token: write
jobs:
  update:
    runs-on: "ubuntu-latest"
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository }}
    continue-on-error: true
    steps:
    - name: Get GitHub App token
      id: get-github-app-token
      uses: grafana/shared-workflows/actions/create-github-app-token@e5b7989c92b55fe3ac6dd006d6de49082ba8c507 # create-github-app-token (github-script/v9)
      with:
        github_app: grafana-ci-bot

    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        ref: ${{ github.event.pull_request.head.ref }}
        token: ${{ steps.get-github-app-token.outputs.token }}
        persist-credentials: false

    - name: Set go version
      uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00
      with:
        go-version-file: go.mod

    - name: Configure Git
      run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git config --local --add --bool push.autoSetupRemote true

    - name: Update workspace
      run: make update-workspace

    - name: Commit and push workspace changes
      env:
        BRANCH_NAME: ${{ github.head_ref || github.ref_name }} 
      run: |
        if ! git diff --exit-code --quiet; then
          echo "Committing and pushing workspace changes"
          git commit -a -m "update workspace"
          git push origin "$BRANCH_NAME"
        fi
