name: Run commands when issues are labeled or comments added

on:
  issues:
    types: [labeled, unlabeled]
  issue_comment:
    types: [created]

concurrency:
  group: issue-commands-${{ github.event.issue.number }}

permissions: {}

jobs:
  config:
    runs-on: ubuntu-arm64-small
    outputs:
      has-secrets: ${{ steps.check.outputs.has-secrets }}
    steps:
      - name: "Check for secrets"
        id: check
        shell: bash
        run: |
          if [ "${{ github.repository }}" == "grafana/grafana" ]; then
            echo "has-secrets=1" >> "$GITHUB_OUTPUT"
          fi

  main:
    needs: config
    if: needs.config.outputs.has-secrets
    runs-on: ubuntu-arm64-small
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@46f48da11e78ebdba7a8747ae456b11062fac83e # create-github-app-token/v0.3.1
        with:
          github_app: grafana-pr-automation

      - name: Run commands
        uses: grafana/grafana-github-actions/commands@main
        with:
          metricsWriteAPIKey: ""
          token: ${{ steps.get-github-app-token.outputs.token }}
          configPath: commands
