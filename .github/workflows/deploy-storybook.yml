name: Deploy Storybook

on:
  push:
    branches:
      - main
  workflow_call:
    inputs:
      version:
        required: true
        description: The version being released (with a v prefix)
        type: string
  workflow_dispatch:
    inputs:
      version:
        required: true
        description: The version being released (with a v prefix)
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  detect-changes:
    # Only run on push to main (not needed for workflow_call releases)
    if: github.repository == 'grafana/grafana' && github.event_name == 'push'
    name: Detect whether code changed
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed-frontend-packages: ${{ steps.detect-changes.outputs.frontend-packages }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true # required to get more history in the changed-files action
          fetch-depth: 2
      - name: Detect changes
        id: detect-changes
        uses: ./.github/actions/change-detection
        with:
          self: .github/workflows/deploy-storybook.yml
  deploy-storybook:
    name: Deploy Storybook
    runs-on: ubuntu-latest
    needs: detect-changes
    # Only run in grafana/grafana
    if: always() && github.repository == 'grafana/grafana' && (needs.detect-changes.outputs.changed-frontend-packages == 'true' || inputs.version != '')
    permissions:
      contents: read
      id-token: write

    env:
      BUCKET_NAME: grafana-storybook
      VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          ref: ${{ inputs.version }}

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Install yarn dependencies
        uses: ./.github/actions/yarn-install

      - name: Build storybook
        run: yarn storybook:build

      # Create the GCS folder name
      # "latest" when triggered from the latest release
      # "canary" on pushes to main
      - name: Create deploy name
        id: create-deploy-name
        run: |
          if [[ -n "$VERSION" ]]; then
            echo "deploy-name=latest" >> "$GITHUB_OUTPUT"
          else
            echo "deploy-name=canary" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GCS
        id: login-to-gcs
        uses: grafana/shared-workflows/actions/login-to-gcs@main
        with:
          environment: prod
          service_account: github-gf-storybook-deploy@grafanalabs-workload-identity.iam.gserviceaccount.com

      - name: Cleanup old storybook
        id: cleanup-old-storybook
        run: |
          gcloud storage rm "gs://${{ env.BUCKET_NAME }}/${{ steps.create-deploy-name.outputs.deploy-name }}/**" || echo "No existing files to delete"

      - name: Upload new storybook
        id: upload-new-storybook
        uses: grafana/shared-workflows/actions/push-to-gcs@main
        with:
          environment: prod
          bucket: ${{ env.BUCKET_NAME }}
          bucket_path: ${{ steps.create-deploy-name.outputs.deploy-name }}
          path: packages/grafana-ui/dist/storybook
          service_account: github-gf-storybook-deploy@grafanalabs-workload-identity.iam.gserviceaccount.com
          parent: false
          # need to unset this as the default doesn't work on a bucket with uniform bucket-level access
          predefinedAcl: ''
