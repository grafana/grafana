# This workflow creates a new PR in Grafana which is triggered after a release is completed.
# It should include all code changes that are needed after a release is done. This includes the changelog update and
# version bumps, but could include more in the future.
# Please refrain from including any processes that do not result in code changes in this workflow. Instead, they should
# either be triggered in the release promotion process or in the release comms process (that is triggered by merging
# this PR).
name: Grafana Release PR
on:
  workflow_dispatch:
    inputs:
      previous_version:
        type: string
        required: false
        description: 'The release version (semver, git tag, branch or commit) to use for comparison'
      version:
        required: true
        type: string
        description: The version of Grafana that is being released (without the `v` prefix)`
      target:
        required: false
        type: string
        description: 'Unused: left here for backwards compatibility'
      changelog:
        required: false
        type: boolean
        default: true
      bump:
        required: false
        type: boolean
        default: true
      dry_run:
        required: false
        default: false
        type: boolean
      latest:
        required: false
        default: false
        type: boolean
      release_date:
        required: false
        type: string
        description: "Release date in format YYYY-MM-DD"

permissions:
  contents: read

jobs:
  capture-date:
    runs-on: ubuntu-arm64-small
    outputs:
      release_date: ${{ steps.set_release_date.outputs.release_date }}
    steps:
      - name: compute_release_date
        run: |
          if [ -n "$DATE" ]; then
            echo "release_date=$DATE" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "Fetching workflow run creation date..."
          created_at=$(gh run view "$GITHUB_RUN_ID" --repo "$GH_REPO" --json createdAt -q .createdAt)
          formatted_date=$(date -d "$created_at" +%Y-%m-%d)
          echo "release_date=$formatted_date" >> "$GITHUB_ENV"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          DATE: ${{ inputs.release_date }}

      - id: set_release_date
        run: echo "release_date=$release_date" >> "$GITHUB_OUTPUT"

  push-changelog-to-main:
    needs: capture-date
    permissions:
      contents: write
      id-token: write
      pull-requests: write

    name: Create PR to main to update the changelog
    uses: ./.github/workflows/changelog.yml
    concurrency:
      group: grafana-release-pr-update-changelog-main
      cancel-in-progress: false
    with:
      previous_version: ${{inputs.previous_version}}
      version: ${{ inputs.version }}
      latest: ${{ inputs.latest }}
      dry_run: ${{ inputs.dry_run }}
      target: main
      work_branch: changelog/update-changelog-${{ needs.capture-date.outputs.release_date }}

  create-prs:
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    name: Create Release PR
    runs-on: ubuntu-x64
    if: github.repository == 'grafana/grafana'
    env:
      VERSION: ${{ inputs.version }}
      LATEST: ${{ inputs.latest }}
      DRY_RUN: ${{ inputs.dry_run }}
      RUN_NUMBER: ${{ github.run_number }}
    steps:
      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: grafana-pr-automation
          permission_set: ${{ startsWith(github.ref_name, 'release-') && 'release' || 'main' }}
      - name: Get GitHub App token
        id: get-writer-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: grafana-pr-automation
          permission_set: ${{ startsWith(github.ref_name, 'release-') && 'release-writer' || 'release-writer-main' }}
      - run: echo "RELEASE_BRANCH=release-${VERSION}" >> "$GITHUB_ENV"
      - name: Checkout Grafana target branch #checkout the target branch to base the release branch on
        uses: actions/checkout@v5
        with:
          token: ${{ steps.get-writer-app-token.outputs.token }} # use the writer token which can push
          ref: ${{ env.RELEASE_BRANCH }}
          fetch-tags: true
          fetch-depth: 0
      - name: Checkout Grafana (main)
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          ref: main
          path: .grafana-main

      - name: Setup Node.js
        if: ${{ !contains(inputs.version, '+security') }}
        uses: ./.github/actions/setup-node
      # Use actions/setup-go directly instead of ./.github/actions/setup-go: the composite
      # references ./.github/actions/report-go-cache-sizes, which resolves from this job's
      # workspace (the release-branch checkout). That subtree may lag main and miss the action,
      # failing the step. Mirror cache-build:false behavior (no GOCACHE; modules via actions/cache).
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: .grafana-main/go.mod
          cache: false
      - name: Configure git user
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local --add --bool push.autoSetupRemote true

      - name: Create branch
        run: git checkout -b "release/${RUN_NUMBER}/${VERSION}"
      # Pre-create the new branch on the remote pointing at the release branch's HEAD.
      # Using the REST API rather than `git push` because git push triggers the
      # "Restricts updates to workflow files" pre-receive scan, which times out on
      # branches that diverge significantly from the default branch. The API path
      # may bypass that scan since it's a direct ref creation pointing at an
      # already-existing commit.
      - name: Pre-create branch on remote
        env:
          GH_TOKEN: ${{ steps.get-writer-app-token.outputs.token }}
        run: |
          BASE_SHA=$(git rev-parse "origin/${RELEASE_BRANCH}")
          gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
            --method POST \
            -f "ref=refs/heads/release/${RUN_NUMBER}/${VERSION}" \
            -f "sha=${BASE_SHA}"

      - name: Generate changelog
        id: changelog
        if: ${{ inputs.changelog == true || inputs.changelog == 'true' }}
        uses: ./.grafana-main/.github/actions/changelog
        with:
          previous: ${{inputs.previous_version}}
          target: v${{ env.VERSION }}
          output_file: changelog_items.md
          github_token: ${{  steps.get-github-app-token.outputs.token }}
      - name: Patch CHANGELOG.md
        if: ${{ inputs.changelog == true || inputs.changelog == 'true' }}
        run: |
          # Prepare CHANGELOG.md content with version delimiters
          (
            echo
            echo "# $VERSION ($(date '+%F'))"
            echo
            cat changelog_items.md
          ) > CHANGELOG.part

          # Check if a version exists in the changelog
          if grep -q "<!-- $VERSION START" CHANGELOG.md ; then
            # Replace the content between START and END delimiters
            echo "Version $VERSION is found in the CHANGELOG.md, patching contents..."
            sed -i -e "/$VERSION START/,/$VERSION END/{//!d;}" \
                   -e "/$VERSION START/r CHANGELOG.part" CHANGELOG.md
          else
            # Prepend changelog part to the main changelog file
            echo "Version $VERSION not found in the CHANGELOG.md"
            (
              echo "<!-- $VERSION START -->"
              cat CHANGELOG.part
              echo "<!-- $VERSION END -->"
              cat CHANGELOG.md
            ) > CHANGELOG.tmp
            mv CHANGELOG.tmp CHANGELOG.md
          fi

          rm -f CHANGELOG.part changelog_items.md

          git diff CHANGELOG.md
      - name: "Prettify CHANGELOG.md"
        if: ${{ inputs.changelog == true || inputs.changelog == 'true' }}
        run: npx prettier --write CHANGELOG.md
      - name: Commit & push CHANGELOG.md
        if: ${{ inputs.changelog == true || inputs.changelog == 'true' }}
        run: |
          git add CHANGELOG.md
          git commit --allow-empty -m "Update changelog" CHANGELOG.md
          git push
      # Remove the main checkout before lerna runs so nx doesn't see duplicate plugin
      # package.json files across .grafana-main and the release-branch tree.
      - name: Remove main checkout before bump
        if: ${{ (inputs.bump == true || inputs.bump == 'true') && !contains(inputs.version, '+security') }}
        run: rm -rf .grafana-main
      - name: Bump versions
        if: ${{ (inputs.bump == true || inputs.bump == 'true') && !contains(inputs.version, '+security') }}
        run: |
          yarn install
          npm version patch --no-git-tag-version
          yarn run lerna version patch --no-push --no-git-tag-version --force-publish --exact --yes
          yarn prettier:write
      - name: Commit & push version bumps
        if: ${{ (inputs.bump == true || inputs.bump == 'true') && !contains(inputs.version, '+security') }}
        run: |
          git add package.json lerna.json packages public
          test -e e2e-playwright/test-plugins && git add e2e-playwright/test-plugins
          git commit --allow-empty -m "Update version to $VERSION"
          git push
      # Second yarn install: refresh yarn.lock with the new workspace package refs
      # produced by lerna. Committed/pushed separately to keep the push small.
      - name: Update yarn.lock for new package versions
        if: ${{ (inputs.bump == true || inputs.bump == 'true') && !contains(inputs.version, '+security') }}
        run: yarn install
      - name: Commit & push yarn.lock
        if: ${{ (inputs.bump == true || inputs.bump == 'true') && !contains(inputs.version, '+security') }}
        run: |
          git add yarn.lock
          git commit --allow-empty -m "Update yarn.lock for $VERSION"
          git push

      - name: make gen-cue
        if: ${{ !contains(inputs.version, '+security') }}
        shell: bash
        run: make gen-cue
      - name: Commit & push gen-cue changes
        if: ${{ !contains(inputs.version, '+security') }}
        run: |
          git add .
          git commit --allow-empty -m "Regenerate CUE schemas for $VERSION"
          git push
      - name: Create PR
        env:
          GH_TOKEN: ${{ github.token }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          LATEST_FLAG=()
          if [ "$LATEST" = "true" ]; then
            LATEST_FLAG=(-l "release/latest")
          fi
          gh pr create \
            "${LATEST_FLAG[@]}" \
            -l "no-changelog" \
            --draft \
            --dry-run="$DRY_RUN" \
            -B "${RELEASE_BRANCH}" \
            --title "Release: $VERSION" \
            --body "These code changes must be merged after a release is complete"
