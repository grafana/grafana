# This workflow builds the Go binaries for the different architectures and operating systems to ensure that
# incoming pull requests are able to be compiled for all supported architectures and operating systems.
name: Build Go (matrix)

on:
  pull_request:
  push:
    branches:
      - main
      - release-*.*.*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

permissions: {}

jobs:
  detect-changes:
    name: Detect whether code changed
    if: (github.event_name == 'pull_request' || (github.event_name == 'push' && github.repository == 'grafana/grafana'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.detect-changes.outputs.backend == 'true' || steps.detect-changes.outputs.makefile == 'true' }}
      rpm-packaging: ${{ steps.detect-changes.outputs.rpm-packaging }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true
          fetch-depth: 2
      - name: Detect changes
        id: detect-changes
        uses: ./.github/actions/change-detection
        with:
          self: .github/workflows/build-go-matrix.yml

  build-go:
    needs: detect-changes
    # Run on `main` and on pull_requests where changes were detected
    if: github.event_name != 'pull_request' || (github.event_name == 'pull_request' && needs.detect-changes.outputs.changed == 'true')
    name: ${{ matrix.name }}
    runs-on: ubuntu-x64-large-io
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux/amd64
            goos: linux
            goarch: amd64
          - name: linux/arm64
            goos: linux
            goarch: arm64
          - name: linux/s390x
            goos: linux
            goarch: s390x
          - name: linux/armv6
            goos: linux
            goarch: arm
            goarm: "6"
          - name: linux/armv7
            goos: linux
            goarch: arm
            goarm: "7"
          - name: darwin/arm64
            goos: darwin
            goarch: arm64
          - name: darwin/amd64
            goos: darwin
            goarch: amd64
          - name: windows/arm64
            goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup Go
        uses: ./.github/actions/setup-go
      - name: Build Go (${{ matrix.name }})
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: make build-go

  build-go-enterprise:
    needs: detect-changes
    if: github.event_name != 'pull_request' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && needs.detect-changes.outputs.changed == 'true')
    name: ${{ matrix.name }} (enterprise)
    runs-on: ubuntu-x64-large-io
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux/amd64
            goos: linux
            goarch: amd64
          - name: linux/arm64
            goos: linux
            goarch: arm64
          - name: linux/s390x
            goos: linux
            goarch: s390x
          - name: linux/armv6
            goos: linux
            goarch: arm
            goarm: "6"
          - name: linux/armv7
            goos: linux
            goarch: arm
            goarm: "7"
          - name: darwin/arm64
            goos: darwin
            goarch: arm64
          - name: darwin/amd64
            goos: darwin
            goarch: amd64
          - name: windows/arm64
            goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup Enterprise
        uses: ./.github/actions/setup-enterprise
        with:
          github-app-name: 'grafana-ci-bot'
      - name: Setup Go
        uses: ./.github/actions/setup-go
      - name: Build Go (${{ matrix.name }})
        env:
          CGO_ENABLED: "0"
          GO_BUILD_OS: ${{ matrix.goos }}
          GO_BUILD_ARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: make build-go

  verify-pkg-stig:
    needs: detect-changes
    if: github.event_name != 'pull_request' || (github.event_name == 'pull_request' && needs.detect-changes.outputs.rpm-packaging == 'true')
    name: verify pkg stig (linux/amd64)
    runs-on: ubuntu-x64-large
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-go
      - uses: ./.github/actions/setup-fpm
      - name: Install STIG check tools
        run: |
          sudo add-apt-repository -y universe
          sudo apt-get update -qq
          # openscap-scanner (Ubuntu 24.04+) replaces libopenscap8 (Ubuntu 22.04)
          sudo apt-get install -y --no-install-recommends openscap-scanner rpm || \
            sudo apt-get install -y --no-install-recommends libopenscap8 rpm
      - name: Create stub artifacts
        run: |
          mkdir -p bin/linux/amd64 public/build data/plugins-bundled
          # Stub binary — only the packaging scripts and their installed permissions matter here.
          printf '#!/bin/sh\nexec true\n' > bin/linux/amd64/grafana
          chmod 0755 bin/linux/amd64/grafana
          # Satisfy the Makefile stamp so build-targz skips plugin bundling.
          touch data/plugins-bundled/.platform-linux-amd64.stamp
      - name: Build tar.gz
        env:
          GOOS: linux
          GOARCH: amd64
          BUILD_VERSION: '0.0.0'
          BUILD_NUMBER: stig-test
        run: make build-targz BUILD_VERSION="$BUILD_VERSION" BUILD_NUMBER="$BUILD_NUMBER"
      - name: Build RPM
        env:
          GOOS: linux
          GOARCH: amd64
          BUILD_VERSION: '0.0.0'
          BUILD_NUMBER: stig-test
        run: make build-rpm BUILD_VERSION="$BUILD_VERSION" BUILD_NUMBER="$BUILD_NUMBER"
      - name: Build DEB
        env:
          GOOS: linux
          GOARCH: amd64
          BUILD_VERSION: '0.0.0'
          BUILD_NUMBER: stig-test
        run: make build-deb BUILD_VERSION="$BUILD_VERSION" BUILD_NUMBER="$BUILD_NUMBER"
      - name: Cache SCAP datastream
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # zizmor: ignore[cache-poisoning] -- v5.0.4; key is pinned and content is SHA512-verified
        with:
          path: /tmp/ssg-rhel9-ds.xml
          key: ssg-rhel9-ds-0.1.80
      - name: Verify RPM permissions (DISA-STIG)
        run: sudo bash scripts/verify-pkg-stig.sh dist/grafana_0.0.0_stig-test_linux_amd64.rpm
      - name: Verify DEB permissions (DISA-STIG)
        run: sudo bash scripts/verify-pkg-stig.sh dist/grafana_0.0.0_stig-test_linux_amd64.deb

  # Job required by branch rules: runs even when detect-changes or build jobs were skipped,
  # and fails if any build-go or build-go-enterprise matrix job failed.
  required-build-go-matrix:
    needs:
      - detect-changes
      - build-go
      - build-go-enterprise
      - verify-pkg-stig
    if: always()
    name: All steps completed
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Check jobs
        uses: ./.github/actions/check-jobs
        with:
          needs: ${{ toJson(needs) }}
          failure-message: "One or more build-go matrix jobs failed"
          success-message: "All steps completed successfully"
