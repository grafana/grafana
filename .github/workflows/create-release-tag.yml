name: Create Release Tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v10.0.0)'
        required: true
        type: string
      message:
        description: 'Tag message'
        required: true
        type: string
      commit:
        description: 'Commit SHA to tag'
        required: true
        type: string

permissions: {}

jobs:
  create-tag:
    runs-on: ubuntu-arm64-small
    permissions:
      id-token: write
    steps:
      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: grafana-releases-oss

      - name: Create annotated tag
        env:
          TAG: ${{ inputs.tag }}
          TAG_MESSAGE: ${{ inputs.message }}
          COMMIT_SHA: ${{ inputs.commit }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ steps.get-github-app-token.outputs.token }}
        run: |
          tag_sha=$(gh api "repos/${REPO}/git/tags" \
            --method POST \
            -f "tag=${TAG}" \
            -f "message=${TAG_MESSAGE}" \
            -f "object=${COMMIT_SHA}" \
            -f type="commit" \
            --jq '.sha')

          gh api "repos/${REPO}/git/refs" \
            --method POST \
            -f "ref=refs/tags/${TAG}" \
            -f "sha=${tag_sha}"
