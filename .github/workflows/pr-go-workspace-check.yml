name: "Go Workspace Check"

on:
  workflow_dispatch:
  pull_request:
    branches: [main, release-*]
    paths:
      - .github/workflows/pr-go-workspace-check.yml
      - go.mod
      - go.sum
      - go.work
      - go.work.sum
      - '**/go.mod'
      - '**/go.sum'
      - '**.go'

jobs:
  check:
    name: Go Workspace Check
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Setup Enterprise
      if: github.event.pull_request.head.repo.fork == false
      uses: ./.github/actions/setup-enterprise

    # Enterprise must be cloned before setup-go so that enterprise
    # modules are visible when the Go cache key is computed.
    - name: Setup Go
      uses: ./.github/actions/setup-go
      with:
        cache-build: 'false'

    - name: Update workspace
      run: make update-workspace

    - name: Check for go mod & workspace changes
      run: |
        if ! git diff --exit-code --quiet -- go.mod go.sum '**/go.mod' '**/go.sum' go.work go.work.sum pkg/extensions/enterprise_imports*.go; then
          echo "Changes detected:"
          git diff -- go.mod go.sum '**/go.mod' '**/go.sum' go.work go.work.sum pkg/extensions/enterprise_imports*.go
          echo ""
          echo "Please run 'make update-workspace' and commit the changes."
          exit 1
        fi
    - name: Ensure Dockerfile contains submodule COPY commands
      run: ./scripts/go-workspace/validate-dockerfile.sh
