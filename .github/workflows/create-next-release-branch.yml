name: Create next release branch
on:
  workflow_call:
    inputs:
      ownerRepo:
        type: string
        description: Owner/repo of the repository where the branch is created (e.g. 'grafana/grafana')
        required: true
      source:
        description: The release branch to increment (eg providing `release-11.2.3` will result in `release-11.2.4` being created)
        type: string
        required: true
    outputs:
      branch:
        description: The new branch that was created
        value: ${{ jobs.main.outputs.branch }}
  workflow_dispatch:
    inputs:
      ownerRepo:
        description: Owner/repo of the repository where the branch is created (e.g. 'grafana/grafana')
      source:
        description: The release branch to increment (eg providing `release-11.2.3` will result in `release-11.2.4` being created)
        type: string
        required: true

permissions: {}

jobs:
  main:
    runs-on: ubuntu-arm64-small
    permissions:
      contents: read
      id-token: write
    outputs:
      branch: ${{ steps.branch.outputs.branch }}
    steps:
      # The right app + permission-set depends on which repo we're creating the branch in.
      # Each (app, repo) pair has a dedicated writer-<scope>-<tier> permission-set in the
      # Post-release config entry, because Vault asks GitHub for a token covering every
      # repo in the permission-set's repositories list and no single app is installed on
      # all the target repos.
      - name: Compute app and permission_set
        id: app-config
        env:
          OWNER_REPO: ${{ inputs.ownerRepo }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          case "$OWNER_REPO" in
            grafana/grafana)
              app=grafana-writer
              scope=grafana
              ;;
            grafana/grafana-enterprise)
              # Must be grafana-enterprise-writer: the writer-enterprise-* permission-sets
              # request workflows:write, which grafana-pr-automation does not have.
              app=grafana-enterprise-writer
              scope=enterprise
              ;;
            *)
              echo "Unsupported ownerRepo: $OWNER_REPO" >&2
              exit 1
              ;;
          esac
          if [[ "$REF_NAME" == release-* ]]; then
            tier=release
          else
            tier=main
          fi
          echo "github_app=${app}" | tee -a "$GITHUB_OUTPUT"
          echo "permission_set=writer-${scope}-${tier}" | tee -a "$GITHUB_OUTPUT"
      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: ${{ steps.app-config.outputs.github_app }}
          permission_set: ${{ steps.app-config.outputs.permission_set }}
      - name: Create release branch
        id: branch
        uses: grafana/grafana-github-actions-go/bump-release@main # zizmor: ignore[unpinned-uses]
        with:
          ownerRepo: ${{ inputs.ownerRepo }}
          source: ${{ inputs.source }}
          token: ${{ steps.get-github-app-token.outputs.token }}
