name: End-to-end tests

on:
  pull_request:
  push:
    branches:
      - main
      - release-*.*.*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

permissions: {}

env:
  ACTIONS_STEP_DEBUG: true
  RUNNER_DEBUG: 1

jobs:
  detect-changes:
    # Run on `grafana/grafana` main branch, or on pull requests to prevent double-running on mirrors
    if: (github.event_name == 'pull_request' || (github.event_name == 'push' && github.repository == 'grafana/grafana'))
    name: Detect whether code changed
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.detect-changes.outputs.e2e }}
      cloud_plugins_changed: ${{ steps.detect-changes.outputs.e2e-cloud-plugins }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true # required to get more history in the changed-files action
          fetch-depth: 2
      - name: Detect changes
        id: detect-changes
        uses: ./.github/actions/change-detection
        with:
          self: .github/workflows/pr-e2e-tests.yml

  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.changed == 'true'
    name: Build backend
    runs-on: ubuntu-x64-xlarge
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: grafana/shared-workflows/actions/dockerhub-login@main
        if: github.event.pull_request.head.repo.fork == false
      - uses: grafana/shared-workflows/actions/login-to-gar@main
        if: github.event.pull_request.head.repo.fork == false
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/cache@v4
        id: cache
        with:
          key: "build-backend-${{ runner.os }}-${{ hashFiles('**/go.mod', '**/go.sum', 'go.work', 'go.work.sum', 'pkg/**/*.go', 'apps/**/*.go', '!**_test.go', 'Makefile', 'build.go', 'embed.go') }}"
          path: dist

      - name: Build backend via Dagger
        if: steps.cache.outputs.cache-hit != 'true'
        uses: kminehart/dagger-for-github@590bdefcb7f0c1030fce068a2c041c36582262d6
        env:
          CACHE_BUILDERS: ${{ github.event.pull_request.head.repo.fork == false }}
        with:
          cache-binary: "true"
          version: 0.18.8
          verb: run
          args: go run ./pkg/build/cmd artifacts -a backend:grafana:linux/amd64 --grafana-dir="${PWD}" --cache-builders=${CACHE_BUILDERS} > out.txt

      - uses: actions/upload-artifact@v5
        with:
          name: grafana-backend
          path: dist/
          retention-days: 1

  build-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.changed == 'true'
    name: Build frontend
    runs-on: ubuntu-x64-xlarge
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    outputs:
      frontend-store-key: ${{ steps.store-key.outputs.frontend-store-key }}
    steps:
      - uses: grafana/shared-workflows/actions/dockerhub-login@main
        if: github.event.pull_request.head.repo.fork == false
      - uses: grafana/shared-workflows/actions/login-to-gar@main
        if: github.event.pull_request.head.repo.fork == false
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/cache@v4
        id: cache
        with:
          key: "build-frontend-${{ runner.os }}-${{ hashFiles('yarn.lock', 'package.json', 'packages/**', 'public/**', 'plugins-bundled/**', '!**/*.test.ts', '!**/*.test.tsx', 'tsconfig.json', '.browserslistrc', 'nx.json', '.nvmrc') }}"
          path: |
            dist
            test-plugins
            out.txt

      - name: Build frontend + bundled-plugins via Dagger
        if: steps.cache.outputs.cache-hit != 'true'
        uses: kminehart/dagger-for-github@590bdefcb7f0c1030fce068a2c041c36582262d6
        env:
          CACHE_BUILDERS: ${{ github.event.pull_request.head.repo.fork == false }}
        with:
          cache-binary: "true"
          version: 0.18.8
          verb: run
          args: go run ./pkg/build/cmd artifacts -a frontend -a bundled-plugins --grafana-dir="${PWD}" --cache-builders=${CACHE_BUILDERS} > out.txt

      - uses: actions/setup-node@v4
        if: steps.cache.outputs.cache-hit != 'true'
        with:
          node-version-file: '.nvmrc'
      - name: Build e2e test plugins
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          yarn install --immutable
          yarn e2e:plugin:build
          mkdir -p test-plugins
          cp -r e2e-playwright/test-plugins/* test-plugins/

      - name: Extract frontend store key
        id: store-key
        run: |
          FRONTEND_PATH=$(grep "/public$" out.txt | head -1)
          FRONTEND_KEY=${FRONTEND_PATH#dist/}
          echo "frontend-store-key=${FRONTEND_KEY}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v5
        with:
          name: grafana-frontend
          path: dist/
          retention-days: 1
      - uses: actions/upload-artifact@v5
        with:
          name: grafana-test-plugins
          path: test-plugins/
          retention-days: 1

  build-grafana:
    needs: [build-backend, build-frontend]
    name: Build Grafana artifacts
    runs-on: ubuntu-x64-large
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      docker-image: ${{ steps.push-ghcr.outputs.image }}
    steps:
      - uses: grafana/shared-workflows/actions/dockerhub-login@main
        if: github.event.pull_request.head.repo.fork == false
      - uses: grafana/shared-workflows/actions/login-to-gar@main
        if: github.event.pull_request.head.repo.fork == false
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v4
        with:
          name: grafana-backend
          path: artifacts/backend
      - uses: actions/download-artifact@v4
        with:
          name: grafana-frontend
          path: artifacts/frontend

      # Ensure import directories exist (actions/upload-artifact skips empty dirs)
      # Restore execute permissions stripped by actions/upload-artifact (all files become 644)
      - run: |
          mkdir -p artifacts/frontend/bin/bundled-plugins
          chmod +x artifacts/backend/bin/grafana/linux/amd64/grafana*

      - name: Build tarball + Docker via Dagger
        uses: kminehart/dagger-for-github@590bdefcb7f0c1030fce068a2c041c36582262d6
        env:
          CACHE_BUILDERS: ${{ github.event.pull_request.head.repo.fork == false }}
          FRONTEND_KEY: ${{ needs.build-frontend.outputs.frontend-store-key }}
        with:
          cache-binary: "true"
          version: 0.18.8
          verb: run
          args: >-
            go run ./pkg/build/cmd artifacts
            -a targz:grafana:linux/amd64
            -a docker:grafana:linux/amd64
            --import-dir "bin/grafana/linux/amd64=./artifacts/backend/bin/grafana/linux/amd64"
            --import-dir "${FRONTEND_KEY}=./artifacts/frontend/${FRONTEND_KEY}"
            --import-dir "bin/bundled-plugins=./artifacts/frontend/bin/bundled-plugins"
            --grafana-dir="${PWD}"
            --cache-builders=${CACHE_BUILDERS}
            > out.txt

      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image to GHCR
        id: push-ghcr
        run: |
          set -euo pipefail
          LOADED=$(docker load -i dist/*.docker.tar.gz 2>&1 | grep "Loaded image" | sed 's/Loaded image: //')
          IMAGE="ghcr.io/${{ github.repository }}/grafana:${{ github.run_id }}"
          docker tag "${LOADED}" "${IMAGE}"
          docker push "${IMAGE}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Upload grafana.tar.gz
        uses: actions/upload-artifact@v5
        with:
          retention-days: 1
          name: grafana-tar-gz
          path: dist/*tar.gz

      - name: Upload grafana docker tarball
        uses: actions/upload-artifact@v5
        with:
          retention-days: 1
          name: grafana-docker-tar-gz
          path: dist/*.docker.tar.gz

  push-docker-image:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    needs:
      - build-grafana
    steps:
      - id: get-github-token
        name: "create github app token"
        uses: grafana/shared-workflows/actions/create-github-app-token@eb02241ed0a92aff205feab8ac3afcdf51c757c8 # create-github-app-token-v0.2.0
        with:
          github_app: "delivery-bot-app"
      - uses: grafana/shared-workflows/actions/login-to-gar@main
        id: login-to-gar
        with:
          registry: 'us-docker.pkg.dev'
          environment: 'dev'
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
        with:
          name: grafana-docker-tar-gz
          path: .
      - name: Load & Push Docker image
        env:
          BUILD_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          LOADED_IMAGE_NAME=$(docker load -i *.docker.tar.gz | sed 's/Loaded image: //g')
          VERSION=$(echo "${LOADED_IMAGE_NAME}" | cut -d ':' -f 2 | cut -d '-' -f 1)
          DOCKER_IMAGE="us-docker.pkg.dev/grafanalabs-dev/docker-grafana-dev/grafana:${VERSION}-${BUILD_ID}"
          docker tag "${LOADED_IMAGE_NAME}" "${DOCKER_IMAGE}"
          docker push "${DOCKER_IMAGE}"
          echo "IMAGE=${DOCKER_IMAGE}" >> "$GITHUB_ENV"
      - name: Add PR status check
        env:
          GH_TOKEN: ${{ steps.get-github-token.outputs.token }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/grafana/grafana/check-runs \
           -f "name=${IMAGE}" \
           -f "head_sha=${SHA}" \
           -f 'status=completed' \
           -f 'conclusion=neutral' \
           -f 'output[title]=Docker image' \
           -f "output[summary]=${IMAGE}" \
           -f "output[text]=${IMAGE}"

  run-storybook-test:
    name: Verify Storybook (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: detect-changes
    if: needs.detect-changes.outputs.changed == 'true'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: grafana/shared-workflows/actions/dockerhub-login@main
        if: github.event.pull_request.head.repo.fork == false
      - uses: grafana/shared-workflows/actions/login-to-gar@main
        if: github.event.pull_request.head.repo.fork == false

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache@v4
        with:
          key: storybook-yarn-${{ hashFiles('yarn.lock') }}
          path: |
            node_modules
            .yarn/cache
      - name: Install dependencies
        run: yarn install --immutable

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(node -e "console.log(require('@playwright/test/package.json').version)")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          key: storybook-playwright-${{ steps.pw-version.outputs.version }}
          path: ~/.cache/ms-playwright
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Storybook and E2E tests
        run: yarn e2e:playwright:storybook

  run-playwright-tests:
    needs:
      - build-grafana
    name: Playwright E2E tests (${{ matrix.shard }}/${{ matrix.shardTotal }})
    runs-on: ubuntu-x64-large
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6]
        shardTotal: [6]

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: grafana-test-plugins
          path: e2e-test-plugins

      - name: Setup provisioning
        run: |
          mkdir -p grafana-provisioning/{datasources,dashboards,alerting,plugins}
          cp devenv/datasources.yaml grafana-provisioning/datasources/
          cp devenv/dashboards.yaml grafana-provisioning/dashboards/
          cp devenv/alert_rules.yaml grafana-provisioning/alerting/
          cp devenv/plugins.yaml grafana-provisioning/plugins/

      - name: Start Grafana
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker run -d --name grafana \
            -e GF_SERVER_HTTP_PORT=3001 \
            -e GF_PATHS_CONFIG=/grafana-config/custom.ini \
            -e GF_PATHS_PROVISIONING=/grafana-provisioning \
            -p 3001:3001 \
            -v "$PWD/scripts/grafana-server:/grafana-config" \
            -v "$PWD/devenv:/usr/share/grafana/devenv" \
            -v "$PWD/e2e-test-plugins:/var/lib/grafana/plugins" \
            -v "$PWD/grafana-provisioning:/grafana-provisioning" \
            "${{ needs.build-grafana.outputs.docker-image }}"

      - name: Wait for Grafana
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "Grafana is ready"
              exit 0
            fi
            echo "Waiting for Grafana... attempt $i/30"
            sleep 2
          done
          echo "Grafana failed to start. Container logs:"
          docker logs grafana
          exit 1

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache@v4
        with:
          key: e2e-yarn-${{ hashFiles('yarn.lock') }}
          path: |
            node_modules
            .yarn/cache
      - run: yarn install --immutable

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(node -e "console.log(require('@playwright/test/package.json').version)")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          key: playwright-${{ steps.pw-version.outputs.version }}
          path: ~/.cache/ms-playwright
      - run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: yarn e2e:playwright --shard=${{ matrix.shard }}/${{ matrix.shardTotal }} --reporter=dot,blob --output=playwright-test-results
        env:
          GRAFANA_URL: http://localhost:3001
          CI: true

      - uses: actions/upload-artifact@v5
        if: success() || failure()
        with:
          name: playwright-blob-${{ github.run_number }}-${{ matrix.shard }}
          path: blob-report
          retention-days: 1

  required-playwright-tests:
    needs:
      - run-playwright-tests
      - run-storybook-test
      - build-grafana
    if: ${{ !cancelled() }}
    name: All Playwright tests complete
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: grafana/shared-workflows/actions/dockerhub-login@main
        if: github.event.pull_request.head.repo.fork == false
      - uses: grafana/shared-workflows/actions/login-to-gar@main
        if: github.event.pull_request.head.repo.fork == false

      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Download blob reports from GitHub Actions Artifacts
        uses: actions/download-artifact@v6
        with:
          path: blobs
          pattern: playwright-blob-*
          merge-multiple: true

      - name: Check blob reports
        run: |
          if [ ! "$(ls -A ./blobs)" ]; then
            echo "Error: No blob reports found in ./blobs directory"
            echo "Did the Playwright tests run at all?"
            exit 1
          fi
          echo "Found blob reports in ./blobs:"
          ls -lah ./blobs

      - name: Merge into HTML Report
        run: npx playwright merge-reports --reporter html ./blobs

      - name: Merge into JSON Report
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: /tmp/playwright-results.json
        run: npx playwright merge-reports --reporter=json ./blobs

      - name: Bench report
        run: |
          docker run --rm \
            --volume="/tmp/playwright-results.json:/home/bench/tests/playwright-results.json" \
            us-docker.pkg.dev/grafanalabs-global/docker-grafana-bench-prod/grafana-bench:v0.5.1 report \
              --grafana-url "http://localhost:3000" \
              --grafana-version "CI- ${{ github.sha }}" \
              --test-suite-name "FrontendCore" \
              --report-input playwright \
              --report-output log \
              --log-level DEBUG \
              /home/bench/tests/playwright-results.json

      - name: Upload HTML report
        id: upload-html
        uses: actions/upload-artifact@v5
        with:
          name: playwright-html-${{ github.run_number }}
          path: playwright-report
          retention-days: 7

      - name: Check test suites
        id: check-jobs
        uses: ./.github/actions/check-jobs
        continue-on-error: true # Failure will be reported on Show test results step
        with:
          needs: ${{ toJson(needs) }}
          failure-message: "One or more E2E test suites have failed"
          success-message: "All E2E test suites completed successfully"

      - name: Show test results
        env:
          FAILED: ${{ steps.check-jobs.outputs.any-failed }}
          REPORT_URL: ${{ steps.upload-html.outputs.artifact-url }}
        # sed removes the leading `../../src/` from the paths
        run: |
          npx playwright merge-reports --reporter list ./blobs | sed 's|\(\.\./\)\{1,\}src/|/|g'
          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "Download the test report from $REPORT_URL"
            exit 1
          fi

  run-a11y-test:
    needs:
      - build-grafana
    name: A11y test
    runs-on: ubuntu-x64-large
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: grafana/shared-workflows/actions/dockerhub-login@main
        if: github.event.pull_request.head.repo.fork == false
      - uses: grafana/shared-workflows/actions/login-to-gar@main
        if: github.event.pull_request.head.repo.fork == false
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v6
        with:
          name: grafana-tar-gz
      - name: Run PR a11y test
        if: github.event_name == 'pull_request'
        uses: kminehart/dagger-for-github@590bdefcb7f0c1030fce068a2c041c36582262d6
        with:
          cache-binary: "true"
          version: 0.18.8
          verb: run
          args: go run ./pkg/build/a11y --package=grafana.tar.gz
      - name: Run non-PR a11y test
        if: github.event_name != 'pull_request'
        uses: kminehart/dagger-for-github@590bdefcb7f0c1030fce068a2c041c36582262d6
        with:
          cache-binary: "true"
          version: 0.18.8
          verb: run
          args: go run ./pkg/build/a11y --package=grafana.tar.gz --no-threshold-fail --results=./pa11y-ci-results.json
      - name: Upload pa11y results
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v5
        with:
          retention-days: 1
          name: pa11y-ci-results
          path: pa11y-ci-results.json

  publish-metrics:
    needs:
      - run-a11y-test
    name: Publish metrics
    # Run on `grafana/grafana` main branch only
    if: github.event_name == 'push' && github.repository == 'grafana/grafana' && github.ref_name == 'main'
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - id: vault-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@main
        with:
          repo_secrets: |
            GRAFANA_MISC_STATS_API_KEY=grafana-misc-stats:api_key
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - name: Install dependencies
        run: yarn install --immutable
      - name: Get pa11y results
        uses: actions/download-artifact@v6
        with:
          name: pa11y-ci-results
      - name: Extract and publish metrics
        run: ./scripts/ci-frontend-metrics.sh | node --experimental-strip-types .github/workflows/scripts/publish-frontend-metrics.mts
        env:
          GRAFANA_MISC_STATS_API_KEY: ${{ env.GRAFANA_MISC_STATS_API_KEY}}
