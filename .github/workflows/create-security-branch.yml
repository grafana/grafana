name: Create security branch
on:
  workflow_call:
    inputs:
      release_branch:
        type: string
        description: The release branch to increment (eg providing `release-11.2.3` will result in `release-11.2.3+security-01` being created)
        required: true
      security_branch_number:
        type: string
        description: 'The security branch number (e.g., 01)'
        required: false
        default: '01'
      repository:
        type: string
        description: 'The repository to create the security branch in (e.g., grafana/grafana-security-mirror)'
        required: true
    outputs:
      branch:
        description: The new security branch that was created
        value: ${{ jobs.main.outputs.branch }}
  workflow_dispatch:
    inputs:
      release_branch:
        type: string
        description: The release branch to increment (eg providing `release-11.2.3` will result in `release-11.2.3+security-01` being created)
        required: true
      security_branch_number:
        type: string
        description: 'The security branch number (e.g., 01)'
        required: false
        default: '01'
      repository:
        type: string
        description: 'The repository to create the security branch in (e.g., grafana/grafana-security-mirror)'
        required: true

permissions: {}

jobs:
  main:
    runs-on: ubuntu-arm64-small
    permissions:
      # Pushes use the app token via actions/checkout; GITHUB_TOKEN needs only OIDC for Vault.
      contents: read
      id-token: write
    outputs:
      branch: ${{ steps.branch.outputs.branch }}
    steps:
      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: grafana-delivery-bot

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.get-github-app-token.outputs.token }}
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.release_branch }}

      - name: Create security branch
        id: branch
        env:
          GITHUB_TOKEN: ${{ steps.get-github-app-token.outputs.token }}
          INPUT_RELEASE_BRANCH: ${{ inputs.release_branch }}
          INPUT_SECURITY_BRANCH_NUMBER: ${{ inputs.security_branch_number }}
          INPUT_REPOSITORY: ${{ inputs.repository }}
        run: |
          chmod +x .github/workflows/scripts/create-security-branch/create-security-branch.sh
          .github/workflows/scripts/create-security-branch/create-security-branch.sh
