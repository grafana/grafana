name: Create security branch
on:
  workflow_call:
    inputs:
      release_branch:
        type: string
        description: The release branch to increment (eg providing `release-11.2.3` will result in `release-11.2.3+security-01` being created)
        required: true
      security_branch_number:
        type: string
        description: 'The security branch number (e.g., 01)'
        required: false
        default: '01'
      repository:
        type: string
        description: 'The repository to create the security branch in (e.g., grafana/grafana-security-mirror)'
        required: true
    outputs:
      branch:
        description: The new security branch that was created
        value: ${{ jobs.main.outputs.branch }}
  workflow_dispatch:
    inputs:
      release_branch:
        type: string
        description: The release branch to increment (eg providing `release-11.2.3` will result in `release-11.2.3+security-01` being created)
        required: true
      security_branch_number:
        type: string
        description: 'The security branch number (e.g., 01)'
        required: false
        default: '01'
      repository:
        type: string
        description: 'The repository to create the security branch in (e.g., grafana/grafana-security-mirror)'
        required: true

permissions: {}

jobs:
  main:
    runs-on: ubuntu-arm64-small
    permissions:
      # Pushes use the app token via actions/checkout; GITHUB_TOKEN needs only OIDC for Vault.
      contents: read
      id-token: write
    outputs:
      branch: ${{ steps.branch.outputs.branch }}
    steps:
      # The right app + permission-set depends on which repo we're creating the branch in.
      # Each (app, repo) pair has a dedicated writer-<scope>-<tier> permission-set in the
      # Post-release config entry, because Vault asks GitHub for a token covering every
      # repo in the permission-set's repositories list and no single app is installed on
      # all the target repos.
      - name: Compute app and permission_set
        id: app-config
        env:
          REPOSITORY: ${{ inputs.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          case "$REPOSITORY" in
            grafana/grafana-security-mirror)
              app=grafana-security-mirror-writer
              scope=security-mirror
              ;;
            grafana/grafana-enterprise)
              app=grafana-pr-automation
              scope=enterprise
              ;;
            *)
              echo "Unsupported repository: $REPOSITORY" >&2
              exit 1
              ;;
          esac
          if [[ "$REF_NAME" == release-* ]]; then
            tier=release
          else
            tier=main
          fi
          echo "github_app=${app}" | tee -a "$GITHUB_OUTPUT"
          echo "permission_set=writer-${scope}-${tier}" | tee -a "$GITHUB_OUTPUT"
      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@46f48da11e78ebdba7a8747ae456b11062fac83e # create-github-app-token/v0.3.1
        with:
          github_app: ${{ steps.app-config.outputs.github_app }}
          permission_set: ${{ steps.app-config.outputs.permission_set }}

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.get-github-app-token.outputs.token }}
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.release_branch }}

      - name: Create security branch
        id: branch
        env:
          GITHUB_TOKEN: ${{ steps.get-github-app-token.outputs.token }}
          INPUT_RELEASE_BRANCH: ${{ inputs.release_branch }}
          INPUT_SECURITY_BRANCH_NUMBER: ${{ inputs.security_branch_number }}
          INPUT_REPOSITORY: ${{ inputs.repository }}
        run: |
          chmod +x .github/workflows/scripts/create-security-branch/create-security-branch.sh
          .github/workflows/scripts/create-security-branch/create-security-branch.sh
