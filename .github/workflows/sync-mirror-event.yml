# Owned by grafana-delivery-squad
# Intended to be dropped into the base repo, Ex: grafana/grafana
name: Dispatch sync to mirror
run-name: dispatch-sync-to-mirror-${{ github.ref_name }}
on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "v*.*.*"
      - "release-*"

permissions: {}

# This is run after the pull request has been merged, so we'll run against the target branch
jobs:
  dispatch-job:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      actions: write
    env:
      REF_NAME: ${{ github.ref_name }}
      REPO: ${{ github.repository }}
      SHA: ${{ github.sha }}
    steps:
      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@e5b7989c92b55fe3ac6dd006d6de49082ba8c507 # create-github-app-token (github-script/v9)
        with:
          github_app: grafana-delivery-bot

      - uses: actions/github-script@v8
        if: github.repository == 'grafana/grafana'
        with:
          github-token: ${{ steps.get-github-app-token.outputs.token }}
          script: |
            const {REF_NAME, REPO, SHA} = process.env;

            await github.rest.actions.createWorkflowDispatch({
                owner: 'grafana',
                repo: 'security-patch-actions',
                workflow_id: 'mirror-branch-and-apply-patches-event.yml',
                ref: 'main',
                inputs: {
                  src_ref: REF_NAME,
                  src_repo: REPO,
                  src_sha: SHA,
                  dest_repo: REPO + "-security-mirror",
                  patch_repo: REPO + "-security-patches"
                }
            })
