name: "Grafana Bundle Schema Types"
description: "Generates TypeScript types from the Grafana plugin schema and PRs them to plugin-extension-types."

outputs:
  typesFilePath:
    description: "Path to the generated types file (relative to the runner workspace)."
    value: ${{ steps.set-outputs.outputs.typesFilePath }}

runs:
  using: "composite"
  steps:
    - name: Check repository owner
      if: ${{ github.repository_owner != 'grafana' }}
      run: |
        echo "This action can only be run from within the Grafana organization."
        exit 1
      shell: bash

    - name: Get GitHub App token
      id: get-github-app-token
      uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
      with:
        github_app: grafana-plugins-platform-bot

    - name: Clone plugin-extension-types
      run: |
        cd ..
        gh repo clone grafana/plugin-extension-types
      shell: bash
      env:
        GITHUB_TOKEN: ${{ steps.get-github-app-token.outputs.token }}

    - name: Generate TypeScript types
      working-directory: ${{ github.workspace }}
      env:
        PLUGIN_SCHEMA_TYPES_OUT: ../plugin-extension-types/types/plugin-schema/index.d.ts
      run: |
        mkdir -p ../plugin-extension-types/types/plugin-schema
        pnpm run gen-plugin-schema-types
        echo "Generated TypeScript types from plugin schema"
      shell: bash

    - name: Check diff for changes
      id: check-diff
      run: |
        cd ../plugin-extension-types
        if [[ -n $(git status --porcelain) ]]; then
          echo "Changes to schema types detected..."
          echo "has-changes=true" >> "$GITHUB_OUTPUT"
        else
          echo "No changes found"
          echo "has-changes=false" >> "$GITHUB_OUTPUT"
        fi
      shell: bash

    - name: Push to stable bot branch
      if: ${{ steps.check-diff.outputs.has-changes == 'true' }}
      env:
        GITHUB_TOKEN: ${{ steps.get-github-app-token.outputs.token }}
      run: |
        cd ../plugin-extension-types
        git config --local user.name 'grafana-plugins-platform-bot[bot]'
        git config --local user.email '144369747+grafana-plugins-platform-bot[bot]@users.noreply.github.com'

        BRANCH_NAME="grafana-plugins-platform-bot/update-plugin-schema-types"
        git checkout -B "$BRANCH_NAME"
        git add .
        git commit -m "types: updating plugin schema types"
        git push --force-with-lease "https://x-access-token:${GITHUB_TOKEN}@github.com/grafana/plugin-extension-types" "$BRANCH_NAME"
      shell: bash

    - name: Open PR if missing
      if: ${{ steps.check-diff.outputs.has-changes == 'true' }}
      env:
        GITHUB_TOKEN: ${{ steps.get-github-app-token.outputs.token }}
      run: |
        cd ../plugin-extension-types

        PR_NUMBER=$(gh pr list --base main --head grafana-plugins-platform-bot/update-plugin-schema-types --json number -q '.[0].number')

        if [ -z "$PR_NUMBER" ]; then
          PR_BODY=$(cat <<'EOF'
        Hello! 👋

        This PR was auto generated by the Grafana Bundle Schema Types action.

        **Notes for reviewer:**
        This is an auto-generated PR which generated TypeScript types from the Grafana plugin schema using `json-schema-to-typescript`.
        Please review the changes thoroughly before merging.
        EOF
        )
          gh pr create --base main --head grafana-plugins-platform-bot/update-plugin-schema-types --title "Chore: Update plugin schema types" --body "$PR_BODY" --label "types-update"
        else
          echo "PR #$PR_NUMBER already open against grafana-plugins-platform-bot/update-plugin-schema-types; the force-push updated it in place."
        fi
      shell: bash

    - name: Set outputs
      id: set-outputs
      run: |
        echo "typesFilePath=../plugin-extension-types/types/plugin-schema/index.d.ts" >> "$GITHUB_OUTPUT"
      shell: bash
