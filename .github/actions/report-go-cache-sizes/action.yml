name: Report Go Cache Sizes
description: Logs GOMODCACHE and GOCACHE sizes.

runs:
  using: "composite"
  steps:
    - name: Report Go cache sizes
      shell: bash
      run: |
        echo "GOMODCACHE: $(du -sh "$(go env GOMODCACHE)" 2>/dev/null | cut -f1 || echo 'N/A') ($(go env GOMODCACHE))"
        echo "GOCACHE:    $(du -sh "$(go env GOCACHE)" 2>/dev/null | cut -f1 || echo 'N/A') ($(go env GOCACHE))"
