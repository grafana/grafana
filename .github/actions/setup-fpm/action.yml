name: Setup FPM
description: Installs Ruby and the fpm packaging gem with heavy caching.

inputs:
  fpm-version:
    description: Version of the fpm gem to install.
    required: false
    default: '1.17.0'

runs:
  using: composite
  steps:
    - uses: ruby/setup-ruby@3ff19f5e2baf30647122352b96108b1fbe250c64 # v1.299.0
      with:
        ruby-version: '3.4.9'
        bundler-cache: false
    - name: Cache fpm gem
      id: cache-fpm
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ${{ runner.temp }}/fpm-gems
        key: fpm-${{ runner.os }}-${{ runner.arch }}-${{ inputs.fpm-version }}
    - name: Install fpm
      if: steps.cache-fpm.outputs.cache-hit != 'true'
      shell: bash
      env:
        GEM_HOME: ${{ runner.temp }}/fpm-gems
        FPM_VERSION: ${{ inputs.fpm-version }}
      run: gem install fpm -v "$FPM_VERSION" --no-document
    - name: Export GEM_HOME and add fpm to PATH
      shell: bash
      run: | # zizmor: ignore[github-env]
        echo "GEM_HOME=${{ runner.temp }}/fpm-gems" | tee -a "$GITHUB_ENV"
        echo "${{ runner.temp }}/fpm-gems/bin" | tee -a "$GITHUB_PATH"
