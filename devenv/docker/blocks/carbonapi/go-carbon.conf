[common]
logfile = ""
logLevel = "info"
maxCPU = 1
graphPrefix = "carbon.agents.{host}"
metricEndpoint = ""
metricInterval = "1m0s"

[whisper]
data-dir = "/var/lib/graphite/whisper"
schemas-file = "/etc/go-carbon/storage-schemas.conf"
aggregation-file = ""
workers = 1
max-updates-per-second = 0
max-creates-per-second = 0
sparse-create = false
enabled = true

[cache]
max-size = 1000000
write-strategy = "max"

[udp]
listen = ":2003"
enabled = false
log-incomplete = false

[tcp]
listen = ":2003"
enabled = true

[pickle]
listen = ":2004"
enabled = true
max-message-size = 67108864

[carbonserver]
listen = ":8080"
enabled = true
# Rebuild the in-memory index every 3 seconds so metrics/find?query=* returns
# 200 shortly after the first whisper file is created. Default is 5 minutes.
# NOTE: the correct key is "scan-frequency" (not "filescaninterval").
scan-frequency = "3s"
# Index new metrics immediately when received (before the next scan cycle).
realtime-index = 1

[dump]
enabled = false

[pprof]
listen = "localhost:7007"
enabled = false
