[common]
user = ""
logfile = ""
logLevel = "info"
maxCPU = 1
graphPrefix = ""
metricEndpoint = ""
metricInterval = "1m0s"

[whisper]
data-dir = "/var/lib/go-carbon/whisper"
schemas-file = "/etc/go-carbon/storage-schemas.conf"
workers = 1
max-updates-per-second = 0
sparse-create = false
enabled = true

[cache]
max-size = 1000000
write-strategy = "max"

[udp]
listen = ":2003"
enabled = false

[tcp]
listen = ":2003"
enabled = true

[pickle]
listen = ":2004"
enabled = false

[carbonserver]
# Listen on all interfaces so carbonapi can reach it over the Docker network.
listen = ":8080"
enabled = true
query-cache-enabled = false
find-cache-enabled = false

[dump]
enabled = false

[pprof]
listen = "localhost:7007"
enabled = false
