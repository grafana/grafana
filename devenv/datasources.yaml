apiVersion: 1

deleteDatasources:
  - name: gdev-influxdb
  - name: gdev-influxdb-telegraf
  - name: gdev-influxdb2
  - name: gdev-influxdb2-influxql
  - name: gdev-elasticsearch-v2-metrics
  - name: gdev-elasticsearch-v2-logs
  - name: gdev-elasticsearch-v5-metrics
  - name: gdev-elasticsearch-v5-logs
  - name: gdev-elasticsearch-v56-metrics
  - name: gdev-elasticsearch-v56-logs
  - name: gdev-elasticsearch-v6-metrics
  - name: gdev-elasticsearch-v6-logs
  - name: gdev-elasticsearch-v6-filebeat
  - name: gdev-elasticsearch-v7-metrics
  - name: gdev-elasticsearch-v7-logs
  - name: gdev-elasticsearch-v7-filebeat
  - name: gdev-elasticsearch-v7-metricbeat

datasources:
  - name: gdev-graphite
    type: graphite
    access: proxy
    url: http://localhost:8180
    jsonData:
      graphiteVersion: '1.1'

  - name: gdev-graphite-1.0
    type: graphite
    access: proxy
    url: http://localhost:8280
    jsonData:
      graphiteVersion: '1.0'

  - name: gdev-graphite-0.9
    type: graphite
    access: proxy
    url: http://localhost:8380
    jsonData:
      graphiteVersion: '0.9'

  - name: gdev-alertmanager
    type: alertmanager
    uid: gdev-alertmanager
    access: proxy
    url: http://localhost:9093
    jsonData:
      implementation: prometheus

  - name: gdev-prometheus
    uid: gdev-prometheus
    type: prometheus
    access: proxy
    url: http://localhost:9090
    basicAuth: true #username: admin, password: admin
    basicAuthUser: admin
    jsonData:
      manageAlerts: true
      alertmanagerUid: gdev-alertmanager
      prometheusType: Prometheus #Cortex | Mimir | Prometheus | Thanos
      prometheusVersion: 2.40.0
    secureJsonData:
      basicAuthPassword: admin #https://grafana.com/docs/grafana/latest/administration/provisioning/#using-environment-variables

  - name: gdev-slow-prometheus
    uid: gdev-slow-prometheus-uid
    type: prometheus
    access: proxy
    url: http://localhost:3011
    basicAuth: true #username: admin, password: admin
    basicAuthUser: admin
    jsonData:
      manageAlerts: false
      prometheusType: Prometheus #Cortex | Mimir | Prometheus | Thanos
      prometheusVersion: 2.40.0
    secureJsonData:
      basicAuthPassword: admin #https://grafana.com/docs/grafana/latest/administration/provisioning/#using-environment-variables

  - name: gdev-testdata
    uid: PD8C576611E62080A
    isDefault: true
    type: testdata

  - name: gdev-influxdb1-influxql
    type: influxdb
    access: proxy
    user: grafana
    url: http://localhost:8087
    secureJsonData:
      password: grafana
    jsonData:
      dbName: site

  - name: gdev-influxdb-flux
    type: influxdb
    access: proxy
    url: http://localhost:8086
    user: grafana
    secureJsonData:
      token: mytoken
      password: grafana12345
    jsonData:
      version: Flux
      organization: myorg
      defaultBucket: mybucket

  - name: gdev-influxdb-influxql
    type: influxdb
    access: proxy
    url: http://localhost:8086
    jsonData:
      dbName: mybucket
      httpHeaderName1: 'Authorization'
    secureJsonData:
      httpHeaderValue1: 'Token mytoken'

  - name: gdev-elasticsearch
    type: elasticsearch
    uid: gdev-elasticsearch
    access: proxy
    url: http://localhost:9200
    jsonData:
      index: '[logs-]YYYY.MM.DD'
      interval: Daily
      timeField: '@timestamp'
      logLevelField: level
      logMessageField: line

  - name: gdev-elasticsearch-filebeat
    type: elasticsearch
    access: proxy
    url: http://localhost:9200
    jsonData:
      index: '[filebeat-]YYYY.MM.DD'
      interval: Daily
      timeField: '@timestamp'
      timeInterval: '10s'
      logMessageField: message
      logLevelField: fields.level

  - name: gdev-elasticsearch-metricbeat
    type: elasticsearch
    access: proxy
    url: http://localhost:9200
    jsonData:
      index: '[metricbeat-]YYYY.MM.DD'
      interval: Daily
      timeField: '@timestamp'
      timeInterval: '10s'

  - name: gdev-mysql
    type: mysql
    url: localhost:3306
    user: grafana
    jsonData:
      database: grafana
    secureJsonData:
      password: password

  - name: gdev-mysql-ds-tests
    type: mysql
    url: localhost:3306
    user: grafana
    jsonData:
      database: grafana_ds_tests
    secureJsonData:
      password: password

  - name: gdev-cloudwatch
    uid: gdev-cloudwatch
    type: cloudwatch
    editable: true
    jsonData:
      authType: credentials
      defaultRegion: eu-west-2
      customMetricsNamespaces: 'CWAgent'

  - name: gdev-e2etestdatasource
    type: grafana-e2etest-datasource
    uid: gdev-e2etest-datasource
    access: proxy
    url: http://localhost:4040
    editable: false
