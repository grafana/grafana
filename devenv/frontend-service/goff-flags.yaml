react19:
  variations:
    enabled: true
    disabled: false
  defaultRule:
    variation: enabled

reportRenderBinding:
  variations:
    enabled: true
    disabled: false
  defaultRule:
    variation: enabled

compiledBootScript:
  variations:
    enabled: true
    disabled: false
  defaultRule:
    variation: disabled

grafana.assetSriChecks:
  variations:
    enabled: true
    disabled: false
  defaultRule:
    variation: disabled

grafana.meticulousAIMode:
  variations:
    off: 'off'
    on-prod-env: 'on-prod-env'
    on-dev-env: 'on-dev-env'
  defaultRule:
    variation: off

frontendService.reducedBootDataAPI:
  variations:
    enabled: true
    disabled: false
  defaultRule:
    variation: disabled

grafana.frontendLegacyAPIHandling:
  variations:
    off: 'off'
    alert: 'alert'
    block: 'block'
  defaultRule:
    variation: off
