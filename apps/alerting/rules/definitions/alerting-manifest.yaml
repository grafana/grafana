apiVersion: apps.grafana.app/v1alpha2
kind: AppManifest
metadata:
  name: alerting
spec:
  appDisplayName: alerting
  appName: alerting
  group: rules.alerting.grafana.app
  preferredVersion: v0alpha1
  versions:
  - kinds:
    - admission:
        mutation:
          operations:
          - CREATE
          - UPDATE
        validation:
          operations:
          - CREATE
          - UPDATE
          - DELETE
      conversion: false
      kind: AlertRule
      plural: AlertRules
      schemas:
        AlertRule:
          properties:
            spec:
              $ref: '#/components/schemas/spec'
            status:
              $ref: '#/components/schemas/status'
          required:
          - spec
        DatasourceUID:
          pattern: ^[a-zA-Z0-9_-]+$
          type: string
        ExecErrState:
          enum:
          - Error
          - Ok
          - Alerting
          - KeepLast
          type: string
        Expression:
          additionalProperties: false
          properties:
            datasourceUID:
              $ref: '#/components/schemas/DatasourceUID'
              description: The UID of the datasource to run this expression against.
                If omitted, the expression will be run against the `__expr__` datasource
            model:
              additionalProperties: {}
              type: object
            queryType:
              description: The type of query if this is a query expression
              type: string
            relativeTimeRange:
              $ref: '#/components/schemas/RelativeTimeRange'
            source:
              description: |-
                Used to mark the expression to be used as the final source for the rule evaluation
                Only one expression in a rule can be marked as the source
                For AlertRules, this is the expression that will be evaluated against the alerting condition
                For RecordingRules, this is the expression that will be recorded
              type: boolean
          required:
          - model
          type: object
        ExpressionMap:
          additionalProperties:
            $ref: '#/components/schemas/Expression'
          description: |-
            TODO: validate that only one can specify source=true
            & struct.MinFields(1) This doesn't work in Cue <v0.12.0 as per
          type: object
        IntervalTrigger:
          additionalProperties: false
          properties:
            interval:
              $ref: '#/components/schemas/PromDuration'
          required:
          - interval
          type: object
        NamedRoutingTree:
          additionalProperties: false
          properties:
            routingTree:
              type: string
            type:
              $ref: '#/components/schemas/NotificationSettingsType'
          required:
          - type
          - routingTree
          type: object
        NoDataState:
          enum:
          - NoData
          - Ok
          - Alerting
          - KeepLast
          type: string
        NotificationSettings:
          description: 'TODO(@moustafab): this should be imported from the notifications
            package'
          oneOf:
          - $ref: '#/components/schemas/SimplifiedRouting'
          - $ref: '#/components/schemas/NamedRoutingTree'
        NotificationSettingsType:
          enum:
          - SimplifiedRouting
          - NamedRoutingTree
          type: string
        OperatorState:
          additionalProperties: false
          properties:
            descriptiveState:
              description: descriptiveState is an optional more descriptive state
                field which has no requirements on format
              type: string
            details:
              additionalProperties: true
              description: details contains any extra information that is operator-specific
              type: object
            lastEvaluation:
              description: lastEvaluation is the ResourceVersion last evaluated
              type: string
            state:
              description: |-
                state describes the state of the lastEvaluation.
                It is limited to three possible states for machine evaluation.
              enum:
              - success
              - in_progress
              - failed
              type: string
          required:
          - lastEvaluation
          - state
          type: object
        PanelRef:
          additionalProperties: false
          properties:
            dashboardUID:
              minLength: 1
              pattern: ^[a-zA-Z0-9_-]+$
              type: string
            panelID:
              exclusiveMinimum: true
              minimum: 0
              type: integer
          required:
          - dashboardUID
          - panelID
          type: object
        PromDuration:
          not:
            pattern: hmuµn
          pattern: ^((([0-9]+)y)?(([0-9]+)w)?(([0-9]+)d)?(([0-9]+)h)?(([0-9]+)m)?(([0-9]+)s)?|0)$
          type: string
        PromDurationWMillis:
          pattern: ^((([0-9]+)y)?(([0-9]+)w)?(([0-9]+)d)?(([0-9]+)h)?(([0-9]+)m)?(([0-9]+)s)?(([0-9]+)ms)?|0)$
          type: string
        RelativeTimeRange:
          additionalProperties: false
          properties:
            from:
              $ref: '#/components/schemas/PromDurationWMillis'
            to:
              $ref: '#/components/schemas/PromDurationWMillis'
          required:
          - from
          - to
          type: object
        SimplifiedRouting:
          additionalProperties: false
          properties:
            activeTimeIntervals:
              items:
                $ref: '#/components/schemas/TimeIntervalRef'
              type: array
            groupBy:
              items:
                type: string
              type: array
            groupInterval:
              $ref: '#/components/schemas/PromDuration'
            groupWait:
              $ref: '#/components/schemas/PromDuration'
            muteTimeIntervals:
              items:
                $ref: '#/components/schemas/TimeIntervalRef'
              type: array
            receiver:
              type: string
            repeatInterval:
              $ref: '#/components/schemas/PromDuration'
            type:
              $ref: '#/components/schemas/NotificationSettingsType'
          required:
          - type
          - receiver
          type: object
        TemplateString:
          type: string
        TimeIntervalRef:
          description: 'TODO(@moustafab): validate regex for time interval ref'
          type: string
        spec:
          additionalProperties: false
          properties:
            annotations:
              additionalProperties:
                $ref: '#/components/schemas/TemplateString'
              type: object
            execErrState:
              $ref: '#/components/schemas/ExecErrState'
              default: Error
            expressions:
              $ref: '#/components/schemas/ExpressionMap'
            for:
              type: string
            keepFiringFor:
              type: string
            labels:
              additionalProperties:
                $ref: '#/components/schemas/TemplateString'
              type: object
            missingSeriesEvalsToResolve:
              minimum: 0
              type: integer
            noDataState:
              $ref: '#/components/schemas/NoDataState'
              default: NoData
            notificationSettings:
              $ref: '#/components/schemas/NotificationSettings'
            panelRef:
              $ref: '#/components/schemas/PanelRef'
            paused:
              type: boolean
            title:
              type: string
            trigger:
              $ref: '#/components/schemas/IntervalTrigger'
          required:
          - title
          - trigger
          - noDataState
          - execErrState
          - expressions
          type: object
        status:
          additionalProperties: false
          properties:
            additionalFields:
              additionalProperties: true
              description: additionalFields is reserved for future use
              type: object
            operatorStates:
              additionalProperties:
                $ref: '#/components/schemas/OperatorState'
              description: |-
                operatorStates is a map of operator ID to operator state evaluations.
                Any operator which consumes this kind SHOULD add its state evaluation information to this field.
              type: object
          type: object
      scope: Namespaced
      selectableFields:
      - spec.title
      - spec.paused
      - spec.panelRef.dashboardUID
      - spec.panelRef.panelID
      - spec.notificationSettings.type
      - spec.notificationSettings.receiver
      - spec.notificationSettings.routingTree
      userReadable: false
    - admission:
        mutation:
          operations:
          - CREATE
          - UPDATE
        validation:
          operations:
          - CREATE
          - UPDATE
          - DELETE
      conversion: false
      kind: RecordingRule
      plural: RecordingRules
      schemas:
        DatasourceUID:
          pattern: ^[a-zA-Z0-9_-]+$
          type: string
        Expression:
          additionalProperties: false
          properties:
            datasourceUID:
              $ref: '#/components/schemas/DatasourceUID'
              description: The UID of the datasource to run this expression against.
                If omitted, the expression will be run against the `__expr__` datasource
            model:
              additionalProperties: {}
              type: object
            queryType:
              description: The type of query if this is a query expression
              type: string
            relativeTimeRange:
              $ref: '#/components/schemas/RelativeTimeRange'
            source:
              description: |-
                Used to mark the expression to be used as the final source for the rule evaluation
                Only one expression in a rule can be marked as the source
                For AlertRules, this is the expression that will be evaluated against the alerting condition
                For RecordingRules, this is the expression that will be recorded
              type: boolean
          required:
          - model
          type: object
        ExpressionMap:
          additionalProperties:
            $ref: '#/components/schemas/Expression'
          description: |-
            TODO: validate that only one can specify source=true
            & struct.MinFields(1) This doesn't work in Cue <v0.12.0 as per
          type: object
        IntervalTrigger:
          additionalProperties: false
          properties:
            interval:
              $ref: '#/components/schemas/PromDuration'
          required:
          - interval
          type: object
        MetricName:
          description: 'TODO(@moustafab): validate the metric name regex'
          pattern: ^[a-zA-Z_:][a-zA-Z0-9_:]*$
          type: string
        OperatorState:
          additionalProperties: false
          properties:
            descriptiveState:
              description: descriptiveState is an optional more descriptive state
                field which has no requirements on format
              type: string
            details:
              additionalProperties: true
              description: details contains any extra information that is operator-specific
              type: object
            lastEvaluation:
              description: lastEvaluation is the ResourceVersion last evaluated
              type: string
            state:
              description: |-
                state describes the state of the lastEvaluation.
                It is limited to three possible states for machine evaluation.
              enum:
              - success
              - in_progress
              - failed
              type: string
          required:
          - lastEvaluation
          - state
          type: object
        PromDuration:
          not:
            pattern: hmuµn
          pattern: ^((([0-9]+)y)?(([0-9]+)w)?(([0-9]+)d)?(([0-9]+)h)?(([0-9]+)m)?(([0-9]+)s)?|0)$
          type: string
        PromDurationWMillis:
          pattern: ^((([0-9]+)y)?(([0-9]+)w)?(([0-9]+)d)?(([0-9]+)h)?(([0-9]+)m)?(([0-9]+)s)?(([0-9]+)ms)?|0)$
          type: string
        RecordingRule:
          properties:
            spec:
              $ref: '#/components/schemas/spec'
            status:
              $ref: '#/components/schemas/status'
          required:
          - spec
        RelativeTimeRange:
          additionalProperties: false
          properties:
            from:
              $ref: '#/components/schemas/PromDurationWMillis'
            to:
              $ref: '#/components/schemas/PromDurationWMillis'
          required:
          - from
          - to
          type: object
        TemplateString:
          type: string
        spec:
          additionalProperties: false
          properties:
            expressions:
              $ref: '#/components/schemas/ExpressionMap'
            labels:
              additionalProperties:
                $ref: '#/components/schemas/TemplateString'
              type: object
            metric:
              $ref: '#/components/schemas/MetricName'
            paused:
              type: boolean
            targetDatasourceUID:
              $ref: '#/components/schemas/DatasourceUID'
            title:
              type: string
            trigger:
              $ref: '#/components/schemas/IntervalTrigger'
          required:
          - title
          - trigger
          - metric
          - expressions
          - targetDatasourceUID
          type: object
        status:
          additionalProperties: false
          properties:
            additionalFields:
              additionalProperties: true
              description: additionalFields is reserved for future use
              type: object
            operatorStates:
              additionalProperties:
                $ref: '#/components/schemas/OperatorState'
              description: |-
                operatorStates is a map of operator ID to operator state evaluations.
                Any operator which consumes this kind SHOULD add its state evaluation information to this field.
              type: object
          type: object
      scope: Namespaced
      selectableFields:
      - spec.title
      - spec.paused
      - spec.metric
      - spec.targetDatasourceUID
      userReadable: false
    - admission:
        mutation:
          operations:
          - CREATE
          - UPDATE
        validation:
          operations:
          - CREATE
          - UPDATE
      conversion: false
      kind: RuleSequence
      plural: RuleSequences
      schemas:
        IntervalTrigger:
          additionalProperties: false
          properties:
            interval:
              $ref: '#/components/schemas/PromDuration'
          required:
          - interval
          type: object
        OperatorState:
          additionalProperties: false
          properties:
            descriptiveState:
              description: descriptiveState is an optional more descriptive state
                field which has no requirements on format
              type: string
            details:
              additionalProperties: true
              description: details contains any extra information that is operator-specific
              type: object
            lastEvaluation:
              description: lastEvaluation is the ResourceVersion last evaluated
              type: string
            state:
              description: |-
                state describes the state of the lastEvaluation.
                It is limited to three possible states for machine evaluation.
              enum:
              - success
              - in_progress
              - failed
              type: string
          required:
          - lastEvaluation
          - state
          type: object
        PromDuration:
          not:
            pattern: hmuµn
          pattern: ^((([0-9]+)y)?(([0-9]+)w)?(([0-9]+)d)?(([0-9]+)h)?(([0-9]+)m)?(([0-9]+)s)?|0)$
          type: string
        RuleRef:
          additionalProperties: false
          properties:
            name:
              $ref: '#/components/schemas/RuleUID'
              description: name is the metadata.name of an AlertRule or RecordingRule
                resource.
          required:
          - name
          type: object
        RuleSequence:
          properties:
            spec:
              $ref: '#/components/schemas/spec'
            status:
              $ref: '#/components/schemas/status'
          required:
          - spec
        RuleUID:
          pattern: ^[a-zA-Z0-9_-]+$
          type: string
        spec:
          additionalProperties: false
          properties:
            alertingRules:
              items:
                $ref: '#/components/schemas/RuleRef'
              type: array
            recordingRules:
              items:
                $ref: '#/components/schemas/RuleRef'
              type: array
            trigger:
              $ref: '#/components/schemas/IntervalTrigger'
          required:
          - trigger
          - recordingRules
          type: object
        status:
          additionalProperties: false
          properties:
            additionalFields:
              additionalProperties: true
              description: additionalFields is reserved for future use
              type: object
            operatorStates:
              additionalProperties:
                $ref: '#/components/schemas/OperatorState'
              description: |-
                operatorStates is a map of operator ID to operator state evaluations.
                Any operator which consumes this kind SHOULD add its state evaluation information to this field.
              type: object
          type: object
      scope: Namespaced
      userReadable: false
    - admission:
        validation:
          operations:
          - CREATE
          - UPDATE
      conversion: false
      kind: Config
      plural: Configs
      schemas:
        Condition:
          additionalProperties: false
          description: |-
            Condition mirrors metav1.Condition. Inlined because the app-sdk codegen
            here can't reference metav1.Condition from CUE. Field semantics are
            k8s-standard; reason values are produced by SyncReason in the syncer.
          properties:
            lastTransitionTime:
              description: RFC3339
              type: string
            message:
              type: string
            observedGeneration:
              type: integer
            reason:
              type: string
            status:
              enum:
              - "True"
              - "False"
              - Unknown
              type: string
            type:
              type: string
          required:
          - type
          - status
          - lastTransitionTime
          - reason
          type: object
        Config:
          properties:
            spec:
              $ref: '#/components/schemas/spec'
            status:
              $ref: '#/components/schemas/status'
          required:
          - spec
        OperatorState:
          additionalProperties: false
          properties:
            descriptiveState:
              description: descriptiveState is an optional more descriptive state
                field which has no requirements on format
              type: string
            details:
              additionalProperties: true
              description: details contains any extra information that is operator-specific
              type: object
            lastEvaluation:
              description: lastEvaluation is the ResourceVersion last evaluated
              type: string
            state:
              description: |-
                state describes the state of the lastEvaluation.
                It is limited to three possible states for machine evaluation.
              enum:
              - success
              - in_progress
              - failed
              type: string
          required:
          - lastEvaluation
          - state
          type: object
        spec:
          additionalProperties: false
          properties:
            externalRulerSync:
              additionalProperties: false
              properties:
                datasourceUid:
                  description: |-
                    datasourceUid is the UID of the Mimir/Cortex Prometheus datasource to
                    sync alert rules from. Empty means no sync is configured for the current
                    org. The operator ini setting `unified_alerting.external_ruler_uid`
                    overrides this when set; see status.externalRulerSync.origin.
                  type: string
                promote:
                  description: |-
                    promote, when true, converts the rules already synced from datasourceUid
                    into native Grafana rules the org owns (provenance is cleared so they
                    become editable) and stops syncing them. This is a one-way action: once
                    promoted the worker no longer manages these rules. Ignored while the
                    operator ini override `unified_alerting.external_ruler_uid` is set.
                  type: boolean
                targetDatasourceUid:
                  description: |-
                    targetDatasourceUid is the UID of the datasource that converted recording
                    rules write their results to. Empty defaults to datasourceUid (the query
                    datasource). Only used when the upstream ruler contains recording rules.
                  type: string
              type: object
          type: object
        status:
          additionalProperties: false
          properties:
            additionalFields:
              additionalProperties: true
              description: additionalFields is reserved for future use
              type: object
            conditions:
              description: |-
                Standard k8s-style condition list. Each binary-state feature owns one
                condition type. Current types:
                  - ExternalRulerSynced: True after a successful sync, False after a
                    failed attempt, Unknown until the first attempt.
              items:
                $ref: '#/components/schemas/Condition'
              type: array
            externalRulerSync:
              additionalProperties: false
              properties:
                datasourceUid:
                  description: |-
                    datasourceUid is the UID actually used on the last sync attempt; may lag
                    spec until the next tick. When origin=ini, this is the ini override value.
                  type: string
                origin:
                  description: |-
                    origin records which source supplied datasourceUid on the last run. "ini"
                    (grafana.ini's unified_alerting.external_ruler_uid) wins over "api"
                    (spec.externalRulerSync.datasourceUid).
                  enum:
                  - api
                  - ini
                  type: string
              type: object
            observedGeneration:
              description: |-
                observedGeneration is the spec.generation last evaluated by the
                controllers writing this status.
              type: integer
            operatorStates:
              additionalProperties:
                $ref: '#/components/schemas/OperatorState'
              description: |-
                operatorStates is a map of operator ID to operator state evaluations.
                Any operator which consumes this kind SHOULD add its state evaluation information to this field.
              type: object
          type: object
      scope: Namespaced
      userReadable: false
    name: v0alpha1
    served: true
