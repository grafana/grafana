apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: alertrules.rules.alerting.grafana.app
spec:
  group: rules.alerting.grafana.app
  names:
    kind: AlertRule
    plural: alertrules
  scope: Namespaced
  versions:
  - name: v0alpha1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              annotations:
                additionalProperties:
                  type: string
                type: object
              execErrState:
                enum:
                - Error
                - Ok
                - Alerting
                - KeepLast
                type: string
              expressions:
                additionalProperties:
                  properties:
                    datasourceUID:
                      pattern: ^[a-zA-Z0-9_-]+$
                      type: string
                    model:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    queryType:
                      description: The type of query if this is a query expression
                      type: string
                    relativeTimeRange:
                      properties:
                        from:
                          pattern: ^((([0-9]+)y)?(([0-9]+)w)?(([0-9]+)d)?(([0-9]+)h)?(([0-9]+)m)?(([0-9]+)s)?(([0-9]+)ms)?|0)$
                          type: string
                        to:
                          pattern: ^((([0-9]+)y)?(([0-9]+)w)?(([0-9]+)d)?(([0-9]+)h)?(([0-9]+)m)?(([0-9]+)s)?(([0-9]+)ms)?|0)$
                          type: string
                      required:
                      - from
                      - to
                      type: object
                    source:
                      description: |-
                        Used to mark the expression to be used as the final source for the rule evaluation
                        Only one expression in a rule can be marked as the source
                        For AlertRules, this is the expression that will be evaluated against the alerting condition
                        For RecordingRules, this is the expression that will be recorded
                      type: boolean
                  required:
                  - model
                  type: object
                description: |-
                  TODO: validate that only one can specify source=true
                  & struct.MinFields(1) This doesn't work in Cue <v0.12.0 as per
                type: object
              for:
                type: string
              keepFiringFor:
                type: string
              labels:
                additionalProperties:
                  type: string
                type: object
              missingSeriesEvalsToResolve:
                minimum: 0
                type: integer
              noDataState:
                enum:
                - NoData
                - Ok
                - Alerting
                - KeepLast
                type: string
              notificationSettings:
                description: 'TODO(@moustafab): this should be imported from the notifications
                  package'
                oneOf:
                - not:
                    anyOf:
                    - required:
                      - routingTree
                  required:
                  - type
                  - receiver
                - not:
                    anyOf:
                    - required:
                      - receiver
                  required:
                  - type
                  - routingTree
                properties:
                  activeTimeIntervals:
                    items:
                      description: 'TODO(@moustafab): validate regex for time interval
                        ref'
                      type: string
                    type: array
                  groupBy:
                    items:
                      type: string
                    type: array
                  groupInterval:
                    pattern: ^((([0-9]+)y)?(([0-9]+)w)?(([0-9]+)d)?(([0-9]+)h)?(([0-9]+)m)?(([0-9]+)s)?|0)$
                    type: string
                  groupWait:
                    pattern: ^((([0-9]+)y)?(([0-9]+)w)?(([0-9]+)d)?(([0-9]+)h)?(([0-9]+)m)?(([0-9]+)s)?|0)$
                    type: string
                  muteTimeIntervals:
                    items:
                      description: 'TODO(@moustafab): validate regex for time interval
                        ref'
                      type: string
                    type: array
                  receiver:
                    type: string
                  repeatInterval:
                    pattern: ^((([0-9]+)y)?(([0-9]+)w)?(([0-9]+)d)?(([0-9]+)h)?(([0-9]+)m)?(([0-9]+)s)?|0)$
                    type: string
                  routingTree:
                    type: string
                  type:
                    enum:
                    - SimplifiedRouting
                    - NamedRoutingTree
                    type: string
                type: object
              panelRef:
                properties:
                  dashboardUID:
                    minLength: 1
                    pattern: ^[a-zA-Z0-9_-]+$
                    type: string
                  panelID:
                    exclusiveMinimum: true
                    minimum: 0
                    type: integer
                required:
                - dashboardUID
                - panelID
                type: object
              paused:
                type: boolean
              title:
                type: string
              trigger:
                properties:
                  interval:
                    pattern: ^((([0-9]+)y)?(([0-9]+)w)?(([0-9]+)d)?(([0-9]+)h)?(([0-9]+)m)?(([0-9]+)s)?|0)$
                    type: string
                required:
                - interval
                type: object
            required:
            - title
            - trigger
            - noDataState
            - execErrState
            - expressions
            type: object
          status:
            properties:
              additionalFields:
                description: additionalFields is reserved for future use
                type: object
                x-kubernetes-preserve-unknown-fields: true
              operatorStates:
                additionalProperties:
                  properties:
                    descriptiveState:
                      description: descriptiveState is an optional more descriptive
                        state field which has no requirements on format
                      type: string
                    details:
                      description: details contains any extra information that is
                        operator-specific
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    lastEvaluation:
                      description: lastEvaluation is the ResourceVersion last evaluated
                      type: string
                    state:
                      description: |-
                        state describes the state of the lastEvaluation.
                        It is limited to three possible states for machine evaluation.
                      enum:
                      - success
                      - in_progress
                      - failed
                      type: string
                  required:
                  - lastEvaluation
                  - state
                  type: object
                description: |-
                  operatorStates is a map of operator ID to operator state evaluations.
                  Any operator which consumes this kind SHOULD add its state evaluation information to this field.
                type: object
            type: object
        required:
        - spec
        type: object
    selectableFields:
    - jsonPath: .spec.title
    - jsonPath: .spec.paused
    - jsonPath: .spec.panelRef.dashboardUID
    - jsonPath: .spec.panelRef.panelID
    - jsonPath: .spec.notificationSettings.type
    - jsonPath: .spec.notificationSettings.receiver
    - jsonPath: .spec.notificationSettings.routingTree
    served: true
    storage: true
    subresources:
      status: {}
