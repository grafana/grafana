apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: configs.rules.alerting.grafana.app
spec:
  group: rules.alerting.grafana.app
  names:
    kind: Config
    plural: configs
  scope: Namespaced
  versions:
  - name: v0alpha1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            description: |-
              Config is the per-org alerting rules admin config — a singleton resource
              carrying admin-controllable settings for the org's rule syncing. Each
              feature's spec and status live in their own file (e.g. externalRulerSync.cue)
              and are merged into the models below.
              externalRulerSync configures syncing alert rules from a Mimir/Cortex
              Prometheus (ruler) datasource into the current org. The worker periodically
              fetches the upstream rule groups and imports them into Grafana as
              converted-Prometheus rules.
            properties:
              externalRulerSync:
                properties:
                  datasourceUid:
                    description: |-
                      datasourceUid is the UID of the Mimir/Cortex Prometheus datasource to
                      sync alert rules from. Empty means no sync is configured for the current
                      org. The operator ini setting `unified_alerting.external_ruler_uid`
                      overrides this when set; see status.externalRulerSync.origin.
                    type: string
                  promote:
                    description: |-
                      promote, when true, converts the rules already synced from datasourceUid
                      into native Grafana rules the org owns (provenance is cleared so they
                      become editable) and stops syncing them. This is a one-way action: once
                      promoted the worker no longer manages these rules. Ignored while the
                      operator ini override `unified_alerting.external_ruler_uid` is set.
                    type: boolean
                  targetDatasourceUid:
                    description: |-
                      targetDatasourceUid is the UID of the datasource that converted recording
                      rules write their results to. Empty defaults to datasourceUid (the query
                      datasource). Only used when the upstream ruler contains recording rules.
                    type: string
                type: object
            type: object
          status:
            properties:
              additionalFields:
                description: additionalFields is reserved for future use
                type: object
                x-kubernetes-preserve-unknown-fields: true
              conditions:
                description: |-
                  Standard k8s-style condition list. Each binary-state feature owns one
                  condition type. Current types:
                    - ExternalRulerSynced: True after a successful sync, False after a
                      failed attempt, Unknown until the first attempt.
                items:
                  description: |-
                    Condition mirrors metav1.Condition. Inlined because the app-sdk codegen
                    here can't reference metav1.Condition from CUE. Field semantics are
                    k8s-standard; reason values are produced by SyncReason in the syncer.
                  properties:
                    lastTransitionTime:
                      description: RFC3339
                      type: string
                    message:
                      type: string
                    observedGeneration:
                      type: integer
                    reason:
                      type: string
                    status:
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      type: string
                  required:
                  - type
                  - status
                  - lastTransitionTime
                  - reason
                  type: object
                type: array
              externalRulerSync:
                properties:
                  datasourceUid:
                    description: |-
                      datasourceUid is the UID actually used on the last sync attempt; may lag
                      spec until the next tick. When origin=ini, this is the ini override value.
                    type: string
                  lastAppliedHash:
                    description: |-
                      lastAppliedHash is the upstream config hash from the last successful sync.
                      The worker reads it to skip unchanged re-applies across restarts and
                      replicas. Internal bookkeeping; not user-facing.
                    type: string
                  origin:
                    description: |-
                      origin records which source supplied datasourceUid on the last run. "ini"
                      (grafana.ini's unified_alerting.external_ruler_uid) wins over "api"
                      (spec.externalRulerSync.datasourceUid).
                    enum:
                    - api
                    - ini
                    type: string
                type: object
              observedGeneration:
                description: |-
                  observedGeneration is the spec.generation last evaluated by the
                  controllers writing this status.
                type: integer
              operatorStates:
                additionalProperties:
                  properties:
                    descriptiveState:
                      description: descriptiveState is an optional more descriptive
                        state field which has no requirements on format
                      type: string
                    details:
                      description: details contains any extra information that is
                        operator-specific
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    lastEvaluation:
                      description: lastEvaluation is the ResourceVersion last evaluated
                      type: string
                    state:
                      description: |-
                        state describes the state of the lastEvaluation.
                        It is limited to three possible states for machine evaluation.
                      enum:
                      - success
                      - in_progress
                      - failed
                      type: string
                  required:
                  - lastEvaluation
                  - state
                  type: object
                description: |-
                  operatorStates is a map of operator ID to operator state evaluations.
                  Any operator which consumes this kind SHOULD add its state evaluation information to this field.
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
