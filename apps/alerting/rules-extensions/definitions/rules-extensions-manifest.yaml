apiVersion: apps.grafana.app/v1alpha2
kind: AppManifest
metadata:
  name: rules-extensions
spec:
  appDisplayName: rules-extensions
  appName: rules-extensions
  group: rules-extensions.alerting.grafana.app
  preferredVersion: v0alpha1
  versions:
  - kinds:
    - admission:
        mutation:
          operations:
          - CREATE
          - UPDATE
        validation:
          operations:
          - CREATE
          - UPDATE
      conversion: false
      kind: PrometheusRuleFile
      plural: PrometheusRuleFiles
      schemas:
        DatasourceUID:
          pattern: ^[a-zA-Z0-9_-]+$
          type: string
        OperatorState:
          additionalProperties: false
          properties:
            descriptiveState:
              description: descriptiveState is an optional more descriptive state
                field which has no requirements on format
              type: string
            details:
              additionalProperties: true
              description: details contains any extra information that is operator-specific
              type: object
            lastEvaluation:
              description: lastEvaluation is the ResourceVersion last evaluated
              type: string
            state:
              description: |-
                state describes the state of the lastEvaluation.
                It is limited to three possible states for machine evaluation.
              enum:
              - success
              - in_progress
              - failed
              type: string
          required:
          - lastEvaluation
          - state
          type: object
        PromDuration:
          not:
            pattern: hmuµn
          pattern: ^((([0-9]+)y)?(([0-9]+)w)?(([0-9]+)d)?(([0-9]+)h)?(([0-9]+)m)?(([0-9]+)s)?|0)$
          type: string
        PrometheusRuleFile:
          properties:
            spec:
              $ref: '#/components/schemas/spec'
            status:
              $ref: '#/components/schemas/status'
          required:
          - spec
        PrometheusRuleGroup:
          additionalProperties: false
          properties:
            interval:
              $ref: '#/components/schemas/PromDuration'
            labels:
              additionalProperties:
                type: string
              type: object
            limit:
              minimum: 0
              type: integer
            name:
              type: string
            queryOffset:
              $ref: '#/components/schemas/PromDuration'
            rules:
              items:
                $ref: '#/components/schemas/RuleEntry'
              type: array
          required:
          - name
          - rules
          type: object
        RuleEntry:
          additionalProperties: false
          properties:
            alert:
              type: string
            annotations:
              additionalProperties:
                type: string
              type: object
            expr:
              type: string
            for:
              $ref: '#/components/schemas/PromDuration'
            keepFiringFor:
              $ref: '#/components/schemas/PromDuration'
            labels:
              additionalProperties:
                type: string
              type: object
            record:
              type: string
          required:
          - expr
          type: object
        spec:
          additionalProperties: false
          properties:
            datasourceUID:
              $ref: '#/components/schemas/DatasourceUID'
            groups:
              items:
                $ref: '#/components/schemas/PrometheusRuleGroup'
              type: array
          required:
          - groups
          type: object
        status:
          additionalProperties: false
          description: |-
            status tracks the child resources currently owned by this PrometheusRuleFile.
            It is the source of truth used by the reconciler to prune children that no longer
            appear in the spec — AlertRules and RecordingRules live in legacy storage which does
            not preserve arbitrary labels, so name-based bookkeeping in status is the only
            reliable way to find what we previously created.
          properties:
            additionalFields:
              additionalProperties: true
              description: additionalFields is reserved for future use
              type: object
            managedAlertRules:
              items:
                type: string
              type: array
            managedFolders:
              items:
                type: string
              type: array
            managedRecordingRules:
              items:
                type: string
              type: array
            operatorStates:
              additionalProperties:
                $ref: '#/components/schemas/OperatorState'
              description: |-
                operatorStates is a map of operator ID to operator state evaluations.
                Any operator which consumes this kind SHOULD add its state evaluation information to this field.
              type: object
          type: object
      scope: Namespaced
    name: v0alpha1
    served: true
