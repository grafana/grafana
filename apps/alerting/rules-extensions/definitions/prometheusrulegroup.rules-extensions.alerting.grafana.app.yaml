apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: prometheusrulegroups.rules-extensions.alerting.grafana.app
spec:
  group: rules-extensions.alerting.grafana.app
  names:
    kind: PrometheusRuleGroup
    plural: prometheusrulegroups
  scope: Namespaced
  versions:
  - name: v0alpha1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            description: |-
              PrometheusRuleSpec mirrors the structure of a Prometheus rules file:
              a list of named groups, each holding alerting and/or recording rules.
            properties:
              groups:
                items:
                  properties:
                    spec:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    status:
                      properties:
                        additionalFields:
                          description: additionalFields is reserved for future use
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        operatorStates:
                          additionalProperties:
                            properties:
                              descriptiveState:
                                description: descriptiveState is an optional more
                                  descriptive state field which has no requirements
                                  on format
                                type: string
                              details:
                                description: details contains any extra information
                                  that is operator-specific
                                type: object
                                x-kubernetes-preserve-unknown-fields: true
                              lastEvaluation:
                                description: lastEvaluation is the ResourceVersion
                                  last evaluated
                                type: string
                              state:
                                description: |-
                                  state describes the state of the lastEvaluation.
                                  It is limited to three possible states for machine evaluation.
                                enum:
                                - success
                                - in_progress
                                - failed
                                type: string
                            required:
                            - lastEvaluation
                            - state
                            type: object
                          description: |-
                            operatorStates is a map of operator ID to operator state evaluations.
                            Any operator which consumes this kind SHOULD add its state evaluation information to this field.
                          type: object
                      type: object
                  required:
                  - metadata
                  - spec
                  - status
                  type: object
                type: array
            required:
            - groups
            type: object
          status:
            properties:
              additionalFields:
                description: additionalFields is reserved for future use
                type: object
                x-kubernetes-preserve-unknown-fields: true
              operatorStates:
                additionalProperties:
                  properties:
                    descriptiveState:
                      description: descriptiveState is an optional more descriptive
                        state field which has no requirements on format
                      type: string
                    details:
                      description: details contains any extra information that is
                        operator-specific
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    lastEvaluation:
                      description: lastEvaluation is the ResourceVersion last evaluated
                      type: string
                    state:
                      description: |-
                        state describes the state of the lastEvaluation.
                        It is limited to three possible states for machine evaluation.
                      enum:
                      - success
                      - in_progress
                      - failed
                      type: string
                  required:
                  - lastEvaluation
                  - state
                  type: object
                description: |-
                  operatorStates is a map of operator ID to operator state evaluations.
                  Any operator which consumes this kind SHOULD add its state evaluation information to this field.
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
